  .auth-card { padding: 20px 14px !important; max-width: calc(100vw - 20px) !important; margin: 0 10px !important; }

  .achievement-popup {

  :root { --card-col: 5; --sidebar-w: 293px; }

ing with thunderous force wherever danger rises. Though his immense power could easily rule the world, Tyran believes the storm exists to protect the weak, not dominate them. When dark clouds gather and the winds begin to roar, people know Tyranneous is already on his way.","pack":1,"alliance":"Hero","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_9_1773610522443.png?alt=media&token=7d1bb949-3fd8-45aa-854a-25c62b81fbf0"},{"id":10,"name":"Nullblade","type":"Stealth","rarity":"Epic","power":85,"defense":78,"speed":93,"emoji":"⚔️","desc":"Phases through matter and strikes vital points.","pack":1,"alliance":"Hero"},{"id":11,"name":"Audio","type":"Tech","rarity":"Epic","power":82,"defense":80,"speed":77,"emoji":"🎵","desc":"Will Melendez, known in the underworld as Audio, believes music is the purest way to control human emotion. After discovering hidden frequencies capable of altering brain activity, he transformed his compositions into weapons that can hypnotize, brainwash, and command entire crowds. Through his speakers, Audio can slip into people’s minds and rewrite their loyalties like a new track on a playlist. He orchestrates crimes like symphonies, turning civilians into a perfectly synchronized army that moves to his rhythm. To Audio, the world is just an audience — and sooner or later, everyone will learn to dance to his tune.","pack":2,"alliance":"Villain","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_11_1773608038519.png?alt=media&token=184f5b6a-028f-4758-8845-fa5786fba298"},{"id":12,"name":"Wraithwing","type":"Flier","rarity":"Epic","power":79,"defense":73,"speed":95,"emoji":"🦅","desc":"Invisible at full speed, unstoppable in a dive.","pack":2,"alliance":"Villain"},{"id":13,"name":"Dr. Jimmy","type":"Healer","rarity":"Epic","power":71,"defense":88,"speed":74,"emoji":"💚","desc":"James Cocozza is the brilliant pharmacist known as Dr. Jimmy, a hero whose mastery of chemistry allows him to create medicines capable of healing nearly any injury, illness, or poison. Working from a mobile lab packed with experimental compounds, he formulates lifesaving cures in moments, turning science into his greatest superpower. From broken bones to deadly toxins, his remedies can restore both people and entire ecosystems pushed to the brink of collapse. But such miraculous medicine comes with a burden—powerful organizations and desperate villains constantly seek to control his formulas. Armed with intellect, compassion, and a case full of cures, Dr. Jimmy fights to ensure healing never falls into the wrong hands.","pack":2,"alliance":"Villain","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_13_1773609826307.png?alt=media&token=e16351c2-f0b4-43d5-aaa9-223cf17e5f7f"},{"id":14,"name":"Seismara","type":"Elemental","rarity":"Epic","power":90,"defense":82,"speed":71,"emoji":"🌊","desc":"Controls tectonic plates and ocean depths.","pack":2,"alliance":"Anti-Hero"},{"id":15,"name":"Phantex","type":"Shapeshifter","rarity":"Epic","power":83,"defense":76,"speed":88,"emoji":"🦎","desc":"Perfectly mimics any creature or person alive.","pack":2,"alliance":"Anti-Hero"},{"id":16,"name":"Cryonix","type":"Elemental","rarity":"Rare","power":72,"defense":68,"speed":65,"emoji":"❄️","desc":"Freezes targets solid at absolute zero.","pack":1,"alliance":"Villain"},{"id":17,"name":"Thunderjack","type":"Speedster","rarity":"Rare","power":68,"defense":58,"speed":94,"emoji":"⚡","desc":"Outruns lightning and delivers electrified blows.","pack":1,"alliance":"Hero"},{"id":18,"name":"Railman","type":"Gadgets","rarity":"Rare","power":65,"defense":70,"speed":62,"emoji":"⚙️","desc":"Garret Sifuentez, known to the world as Railman, grew disillusioned with America’s crumbling public transit systems and endless gridlock. After years of watching reform fail, he rebuilt himself with experimental cybernetics that allow jagged, railroad-like claws to shoot from his hands like living tracks, slicing through steel and concrete alike. Railman believes cities should be built for trains, not cars, and he sabotages highways, demolishes parking structures, and hijacks infrastructure projects to force governments into adopting mass transit. To him, every derailment of the status quo is a step toward a cleaner, more efficient future. In his mind he isn’t a villain—he’s the conductor of a better America, and anyone standing in the way of progress is just another obstacle on the tracks.","pack":1,"alliance":"Villain","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_18_1773605862822.png?alt=media&token=e9df5e54-33ef-462e-a0f3-a51e04e6b236"},{"id":19,"name":"Ved","type":"Mystic","rarity":"Rare","power":74,"defense":63,"speed":67,"emoji":"🔮","desc":"Devki Patel spends her days quietly shelving books as a mild-mannered librarian, but behind her calm smile hides the mind-reading anti-hero known as Ved. Gifted with the ability to hear people’s thoughts as clearly as spoken words, she has learned more secrets than any person ever should. Rather than use her power purely for good, Ved delights in stirring chaos — dropping perfectly timed hints, exposing hidden grudges, and watching tensions explode. Yet when someone truly dangerous lurks behind polite thoughts, she uses that same knowledge to stop them before they act. To Devki, the world is just a giant book club full of secrets — and she can’t resist flipping to the most dramatic chapter.","pack":1,"alliance":"Anti-Hero","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_19_1773607000501.png?alt=media&token=5c1d9204-f6ed-4be5-adbd-8b8be860ffda"},{"id":20,"name":"Bonecaller","type":"Alien","rarity":"Rare","power":70,"defense":65,"speed":60,"emoji":"💀","desc":"Raises fallen enemies as an undead army.","pack":1,"alliance":"Villain"},{"id":21,"name":"Burst","type":"Speedster","rarity":"Rare","power":64,"defense":55,"speed":97,"emoji":"💫","desc":"Anaya Rao, known as Burst, is a lightning-fast antihero whose speed is so extreme it fractures her motion into physical afterimages. Every time she accelerates, multiple copies of her appear, each capable of striking, dodging, or confusing enemies before fading away seconds later. Once a brilliant physics student studying motion and quantum duplication, a lab accident transformed her into a living cascade of kinetic energy. Unlike traditional heroes, Burst walks the line between justice and vengeance, using her powers to dismantle criminal networks that the system fails to stop. When she moves, it’s impossible to tell which version is real—until it’s too late.","pack":1,"alliance":"Anti-Hero","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_21.png?alt=media&token=e7354166-1c39-44e2-b8d1-0c276b880d08"},{"id":22,"name":"Stonewall Dex","type":"Tank","rarity":"Rare","power":60,"defense":88,"speed":45,"emoji":"🛡️","desc":"Absorbs any impact without flinching once.","pack":1,"alliance":"Anti-Hero"},{"id":23,"name":"Luminos","type":"Blaster","rarity":"Rare","power":73,"defense":60,"speed":70,"emoji":"🌟","desc":"Fires concentrated photon beams through solid steel.","pack":1,"alliance":"Hero"},{"id":24,"name":"Mireclaw","type":"Shapeshifter","rarity":"Rare","power":67,"defense":62,"speed":72,"emoji":"🦊","desc":"Shifts into predators three times her size.","pack":1,"alliance":"Hero"},{"id":25,"name":"Skybreaker","type":"Flier","rarity":"Rare","power":69,"defense":64,"speed":85,"emoji":"🦋","desc":"Creates shockwaves powerful enough to down jets.","pack":1,"alliance":"Hero"},{"id":26,"name":"Rho Patel","type":"Tech","rarity":"Rare","power":66,"defense":72,"speed":63,"emoji":"🔬","desc":"Nanotechnology swarm obeys her every mental command.","pack":1,"alliance":"Hero"},{"id":27,"name":"Thornwall","type":"Healer","rarity":"Rare","power":58,"defense":78,"speed":55,"emoji":"🌿","desc":"Regenerates allies and weaponizes healing energy offensively.","pack":1,"alliance":"Hero"},{"id":28,"name":"Shadowmeld","type":"Stealth","rarity":"Rare","power":71,"defense":60,"speed":80,"emoji":"🌑","desc":"Merges with shadows, becoming completely undetectable.","pack":1,"alliance":"Hero"},{"id":29,"name":"Warpulse","type":"Brainiac","rarity":"Rare","power":69,"defense":59,"speed":68,"emoji":"👁️","desc":"Fires psychic pulses that shatter concentration.","pack":1,"alliance":"Hero"},{"id":30,"name":"Cinderax","type":"Blaster","rarity":"Rare","power":75,"defense":57,"speed":66,"emoji":"🔥","desc":"Superheats the air around enemies to ignite them.","pack":1,"alliance":"Villain"},{"id":31,"name":"Wind Waver","type":"Elemental","rarity":"Rare","power":68,"defense":71,"speed":58,"emoji":"🌊","desc":"Olivia Voler is the heroic Wind Waver, a master of both the skies and the seas who commands the forces of wind and waves with effortless grace. She can soar above cities on gusts of air or dive into the ocean’s depths, breathing freely as if she were born to both worlds. With a flick of her hand, she can whip up storms, summon tidal waves, or calm raging winds, turning nature itself into her ally. Olivia uses her powers to protect coastal cities, stranded sailors, and anyone caught between sea and sky, striking with precision wherever danger arises. To those who witness her in action, Wind Waver is a living harmony of air and water, a force of nature that can’t be tamed.","pack":2,"alliance":"Hero","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_31_1773611666131.png?alt=media&token=a2b45503-df04-4b95-93b0-566d2a4c6e4e"},{"id":32,"name":"Ironclad Reva","type":"Tank","rarity":"Rare","power":62,"defense":85,"speed":48,"emoji":"🛡️","desc":"Reinforces her skeleton with living metal alloy.","pack":2,"alliance":"Hero"},{"id":33,"name":"Sirocco","type":"Elemental","rarity":"Rare","power":70,"defense":62,"speed":78,"emoji":"🌪️","desc":"Rides desert winds and scours enemies with sand.","pack":2,"alliance":"Villain"},{"id":34,"name":"Neurostrike","type":"Brainiac","rarity":"Rare","power":72,"defense":61,"speed":64,"emoji":"🧠","desc":"Triggers instant unconsciousness with a glance.","pack":2,"alliance":"Anti-Hero"},{"id":35,"name":"Cobalt Wing","type":"Flier","rarity":"Rare","power":65,"defense":67,"speed":82,"emoji":"🦅","desc":"Dives at Mach 2, talons shredding steel plating.","pack":2,"alliance":"Hero"},{"id":36,"name":"Emberlynx","type":"Speedster","rarity":"Rare","power":67,"defense":56,"speed":91,"emoji":"🦁","desc":"Sprints through walls leaving trails of flame.","pack":2,"alliance":"Anti-Hero"},{"id":37,"name":"Gravitas","type":"Cosmic","rarity":"Rare","power":74,"defense":69,"speed":61,"emoji":"🔱","desc":"Warps local gravity to crush or repel anything.","pack":2,"alliance":"Villain"},{"id":38,"name":"Blue Shift","type":"Mystic","rarity":"Rare","power":71,"defense":64,"speed":65,"emoji":"🔮","desc":"Pragya Rachur is the enigmatic hero known as Blue Shift, a guardian who can teleport not only across vast distances but across moments in time itself. With a flash of mint-blue light she can appear anywhere on Earth — or anywhere in history — often arriving seconds before catastrophe strikes. Pragya perceives time as overlapping layers, allowing her to jump between moments and subtly alter events before the worst outcomes unfold. Though she carries the memories of timelines no one else remembers, she uses that burden to guide her choices and protect the present. To the world she seems to appear exactly when needed most, but only Parallax knows how many futures she has already rewritten.","pack":2,"alliance":"Hero","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_38_1773608703278.png?alt=media&token=01a942f7-6470-4152-88c0-4098a2fea246"},{"id":39,"name":"Brugge","type":"Brawler","rarity":"Rare","power":78,"defense":73,"speed":52,"emoji":"👊","desc":"Marcus \"Mac\" Thorn was once a scrappy street fighter from the rough docks of Antwerp, known for his dirty brawling style and iron-hard fists. After a freak lab accident doused him in an experimental insect-mutation serum, Mac transformed into the fearsome, mantis-hybrid powerhouse known as Brugge. He retains every dirty trick and bone-crushing technique from his human days, now amplified by superhuman strength, razor-spiked gauntlets, and wings that let him close the distance on any opponent in seconds. Brugge fights with pure, relentless aggression — no gadgets, no tactics, just fists and fury until the other guy stops moving. Whether defending the innocent or settling old scores in the ring, one thing hasn't changed: when Mac Thorn throws a punch, people stay down.","pack":2,"alliance":"Hero","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_39.png?alt=media&token=78b72dd4-54a2-4657-8e75-0e8a428dbf45"},{"id":40,"name":"Quillshot","type":"Gadgets","rarity":"Rare","power":63,"defense":65,"speed":69,"emoji":"🎯","desc":"Every projectile she fires tracks its target unerringly.","pack":2,"alliance":"Anti-Hero"},{"id":41,"name":"Darkmantle","type":"Stealth","rarity":"Rare","power":69,"defense":63,"speed":76,"emoji":"🌑","desc":"Creates a zone of absolute darkness around herself.","pack":2,"alliance":"Hero"},{"id":42,"name":"Lyra Steele","type":"Tech","rarity":"Rare","power":64,"defense":74,"speed":61,"emoji":"🦾","desc":"Cybernetic arms punch through reinforced concrete easily.","pack":2,"alliance":"Hero"},{"id":43,"name":"Ashwarden","type":"Alien","rarity":"Rare","power":68,"defense":66,"speed":59,"emoji":"💀","desc":"Draws life force from enemies to heal allies.","pack":2,"alliance":"Hero"},{"id":44,"name":"Pulsara","type":"Blaster","rarity":"Rare","power":73,"defense":59,"speed":68,"emoji":"💥","desc":"Releases electromagnetic pulses disabling every nearby device.","pack":2,"alliance":"Anti-Hero"},{"id":45,"name":"Verdant Fist","type":"Brawler","rarity":"Rare","power":76,"defense":70,"speed":57,"emoji":"🌿","desc":"Channels nature's strength into every devastating strike.","pack":2,"alliance":"Villain"},{"id":46,"name":"Swiftara","type":"Speedster","rarity":"Uncommon","power":55,"defense":44,"speed":88,"emoji":"⚡","desc":"Vibrates through solid objects at running speed.","pack":1,"alliance":"Villain"},{"id":47,"name":"Blockade","type":"Tank","rarity":"Uncommon","power":48,"defense":76,"speed":38,"emoji":"🛡️","desc":"Becomes immovable when standing firm on ground.","pack":1,"alliance":"Villain"},{"id":48,"name":"Spark Reyes","type":"Blaster","rarity":"Uncommon","power":57,"defense":46,"speed":55,"emoji":"💥","desc":"Charges her fists with bioelectric energy.","pack":1,"alliance":"Hero"},{"id":49,"name":"Mosskin","type":"Healer","rarity":"Uncommon","power":42,"defense":60,"speed":48,"emoji":"🌿","desc":"Accelerates natural healing in any living creature.","pack":1,"alliance":"Anti-Hero"},{"id":50,"name":"Driftshadow","type":"Stealth","rarity":"Uncommon","power":54,"defense":50,"speed":72,"emoji":"🌑","desc":"Teleports short distances leaving smoke decoys.","pack":1,"alliance":"Hero"},{"id":51,"name":"Ironpulse","type":"Tech","rarity":"Uncommon","power":52,"defense":58,"speed":50,"emoji":"🤖","desc":"Remotely hacks and controls enemy weapons mid-battle.","pack":1,"alliance":"Hero"},{"id":52,"name":"Razorwing","type":"Flier","rarity":"Uncommon","power":56,"defense":48,"speed":78,"emoji":"🦅","desc":"Wing edges sharp enough to slice through vehicles.","pack":1,"alliance":"Anti-Hero"},{"id":53,"name":"Zephyra","type":"Elemental","rarity":"Uncommon","power":53,"defense":52,"speed":70,"emoji":"🌪️","desc":"Summons powerful gusts that redirect projectiles.","pack":1,"alliance":"Villain"},{"id":54,"name":"Mentara","type":"Brainiac","rarity":"Uncommon","power":58,"defense":49,"speed":54,"emoji":"🧠","desc":"Plants false memories convincingly in unsuspecting minds.","pack":1,"alliance":"Anti-Hero"},{"id":55,"name":"Graveshift","type":"Alien","rarity":"Uncommon","power":55,"defense":54,"speed":47,"emoji":"💀","desc":"Animates two corpses simultaneously as thralls.","pack":1,"alliance":"Hero"},{"id":56,"name":"Ferrix","type":"Shapeshifter","rarity":"Uncommon","power":51,"defense":53,"speed":62,"emoji":"🦎","desc":"Grows extra limbs and natural armor on demand.","pack":1,"alliance":"Villain"},{"id":57,"name":"Comet Dash","type":"Speedster","rarity":"Uncommon","power":54,"defense":43,"speed":85,"emoji":"💫","desc":"Leaves a fiery trail that burns pursuing enemies.","pack":1,"alliance":"Hero"},{"id":58,"name":"Ironhide","type":"Tank","rarity":"Uncommon","power":46,"defense":78,"speed":35,"emoji":"🛡️","desc":"Once a top-tier engineer for a private military contractor, Gerald Verran was gravely injured during a mission. Using experimental nanomechanical armor he designed, he fused himself with the tech to survive, becoming a walking fortress. Now a mercenary for hire, his adaptive armor thickens with every hit, making him nearly unstoppable in prolonged fights. He has a reputation for taking on impossible jobs and protecting whoever can meet his price—morals are flexible, but his loyalty to payment is unwavering. Beneath the metal shell, Gerald still struggles with the man he used to be, haunted by the lives lost in his past contracts.","pack":1,"alliance":"Hero","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_58.png?alt=media&token=cf2f9a10-d0dc-4c3a-85a2-fd593230f3c6"},{"id":59,"name":"Nova Kwan","type":"Blaster","rarity":"Uncommon","power":59,"defense":47,"speed":56,"emoji":"🌟","desc":"Fires photon bursts that disorient enemy senses.","pack":1,"alliance":"Hero"},{"id":60,"name":"Chlora","type":"Healer","rarity":"Uncommon","power":44,"defense":62,"speed":50,"emoji":"💚","desc":"Grows medicinal vines that seal wounds instantly.","pack":1,"alliance":"Hero"},{"id":61,"name":"Umbrix","type":"Stealth","rarity":"Uncommon","power":56,"defense":51,"speed":68,"emoji":"🌑","desc":"Travels through any shadow as if it were a door.","pack":1,"alliance":"Hero"},{"id":62,"name":"Gadgetrix","type":"Gadgets","rarity":"Uncommon","power":50,"defense":56,"speed":52,"emoji":"⚙️","desc":"Deploys miniature drone swarms on command.","pack":1,"alliance":"Hero"},{"id":63,"name":"Stormwing","type":"Flier","rarity":"Uncommon","power":55,"defense":50,"speed":76,"emoji":"🐦","desc":"Calls lightning down during aerial combat dives.","pack":1,"alliance":"Hero"},{"id":64,"name":"Tidecaller","type":"Elemental","rarity":"Uncommon","power":54,"defense":55,"speed":52,"emoji":"🌊","desc":"Summons walls of seawater to shield allies.","pack":1,"alliance":"Villain"},{"id":65,"name":"Mindveil","type":"Brainiac","rarity":"Uncommon","power":57,"defense":48,"speed":55,"emoji":"👁️","desc":"Makes herself invisible to human perception entirely.","pack":1,"alliance":"Hero"},{"id":66,"name":"Rattlebone","type":"Alien","rarity":"Uncommon","power":53,"defense":52,"speed":49,"emoji":"💀","desc":"Hurls cursed bones that track and seek enemies.","pack":1,"alliance":"Hero"},{"id":67,"name":"Prismara","type":"Blaster","rarity":"Uncommon","power":58,"defense":45,"speed":57,"emoji":"🌈","desc":"Refracts light into concentrated cutting beams.","pack":1,"alliance":"Hero"},{"id":68,"name":"Scaleshield","type":"Tank","rarity":"Uncommon","power":47,"defense":75,"speed":40,"emoji":"🦎","desc":"Hardens her skin to the density of diamonds.","pack":1,"alliance":"Hero"},{"id":69,"name":"Fennix","type":"Shapeshifter","rarity":"Uncommon","power":52,"defense":54,"speed":64,"emoji":"🦊","desc":"Copies enemy powers for sixty seconds per shift.","pack":1,"alliance":"Anti-Hero"},{"id":70,"name":"Voltara","type":"Speedster","rarity":"Uncommon","power":56,"defense":44,"speed":86,"emoji":"⚡","desc":"Generates EMP shockwaves at full running speed.","pack":1,"alliance":"Villain"},{"id":71,"name":"Gravitas","type":"Tech","rarity":"Uncommon","power":53,"defense":60,"speed":48,"emoji":"🦾","desc":"Dr. Nadia Voss was once a brilliant theoretical physicist whose groundbreaking research into gravitational field manipulation was dismissed and stolen by the very institution she dedicated her life to. Bitter and brilliant in equal measure, Nadia used her stolen research to build the sleek graviton-tech suit she now wears, turning her life's work into a weapon and herself into the terrifying Gravitas. She can bend, amplify, and reverse gravitational fields at will — crushing enemies under invisible force, hurling debris like missiles, or making herself effectively weightless to glide between skyscrapers with lethal grace. What makes her truly dangerous isn't raw power but cold precision; Nadia doesn't rage, she calculates, and by the time you realize what she's doing, you're already pinned to the ground. She doesn't see herself as a villain — she sees herself as the only person smart enough to take what she's owed, and gravity, as she'll tell you, always wins in the end.","pack":1,"alliance":"Villain","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_71.png?alt=media&token=0fc225ab-ad32-4163-960d-f1bae6e89648"},{"id":72,"name":"Sunlance","type":"Blaster","rarity":"Uncommon","power":60,"defense":46,"speed":54,"emoji":"☀️","desc":"Concentrates sunlight into a laser-hot lance.","pack":1,"alliance":"Hero"},{"id":73,"name":"Lichen","type":"Healer","rarity":"Uncommon","power":43,"defense":61,"speed":51,"emoji":"🌿","desc":"Feeds nutrients through touch, reviving the near-dead.","pack":1,"alliance":"Villain"},{"id":74,"name":"Smokeshift","type":"Stealth","rarity":"Uncommon","power":55,"defense":50,"speed":70,"emoji":"🌑","desc":"Dissolves into smokescreens to escape or ambush.","pack":2,"alliance":"Hero"},{"id":75,"name":"Quakefist","type":"Brawler","rarity":"Uncommon","power":59,"defense":56,"speed":46,"emoji":"👊","desc":"Punches send shockwaves rattling through the ground.","pack":2,"alliance":"Hero"},{"id":76,"name":"Arachnova","type":"Gadgets","rarity":"Uncommon","power":51,"defense":57,"speed":60,"emoji":"🕷️","desc":"Fires adhesive webs strong enough to stop cars.","pack":2,"alliance":"Anti-Hero"},{"id":77,"name":"The Cartographer","type":"Elemental","rarity":"Uncommon","power":55,"defense":53,"speed":68,"emoji":"🌍","desc":"Marcus Vale, known as The Cartographer, is a master strategist who can reshape the world itself as if it were a living map. After uncovering an ancient atlas infused with arcane geometry, he gained the power to bend terrain—raising mountains, shifting rivers, and folding landscapes with a gesture. Glowing cartographic symbols and lines appear wherever he exerts his control, allowing him to redesign battlefields and trap enemies within ever-changing geography. Calm, analytical, and always several moves ahead, Vale treats every conflict like a carefully planned expedition. To oppose the Cartographer is to fight the very ground beneath your feet.","pack":2,"alliance":"Villain","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_77.png?alt=media&token=7d6cc45f-f63d-4a62-85bc-f955b2aaf8cc"},{"id":78,"name":"Crystalback","type":"Tank","rarity":"Uncommon","power":48,"defense":74,"speed":42,"emoji":"💎","desc":"Crystal growths deflect projectiles in all directions.","pack":2,"alliance":"Hero"},{"id":79,"name":"Psi Ramirez","type":"Brainiac","rarity":"Uncommon","power":57,"defense":50,"speed":53,"emoji":"🧠","desc":"Amplifies pain receptors without making physical contact.","pack":2,"alliance":"Villain"},{"id":80,"name":"Ashen Rook","type":"Alien","rarity":"Uncommon","power":54,"defense":53,"speed":50,"emoji":"💀","desc":"Raises a skeletal champion from any nearby bones.","pack":2,"alliance":"Anti-Hero"},{"id":81,"name":"Wyvera","type":"Flier","rarity":"Uncommon","power":56,"defense":51,"speed":77,"emoji":"🐉","desc":"Breathes pressurized steam while diving at enemies.","pack":2,"alliance":"Villain"},{"id":82,"name":"Lumos","type":"Blaster","rarity":"Uncommon","power":57,"defense":47,"speed":56,"emoji":"✨","desc":"Blinds entire squads with full-spectrum light bursts.","pack":2,"alliance":"Hero"},{"id":83,"name":"Coppercoil","type":"Tech","rarity":"Uncommon","power":52,"defense":59,"speed":49,"emoji":"🧲","desc":"Magnetic coils rip metal from enemies hands.","pack":2,"alliance":"Hero"},{"id":84,"name":"Hollowfang","type":"Stealth","rarity":"Uncommon","power":55,"defense":52,"speed":69,"emoji":"🌑","desc":"Injects venom using hollow darkness-forged fangs.","pack":2,"alliance":"Hero"},{"id":85,"name":"Terrashift","type":"Elemental","rarity":"Uncommon","power":56,"defense":57,"speed":47,"emoji":"🌿","desc":"Reshapes earth and stone into barriers or weapons.","pack":2,"alliance":"Hero"},{"id":86,"name":"Blazefur","type":"Brawler","rarity":"Uncommon","power":60,"defense":54,"speed":55,"emoji":"🦁","desc":"Ignites her coat of fur for flaming tackles.","pack":2,"alliance":"Hero"},{"id":87,"name":"Quicksplit","type":"Shapeshifter","rarity":"Uncommon","power":53,"defense":55,"speed":63,"emoji":"🦎","desc":"Splits into two half-strength duplicates mid-fight.","pack":2,"alliance":"Anti-Hero"},{"id":88,"name":"Crestwave","type":"Elemental","rarity":"Uncommon","power":54,"defense":56,"speed":53,"emoji":"🌊","desc":"Surfs atop self-generated waves of water.","pack":2,"alliance":"Anti-Hero"},{"id":89,"name":"Helixar","type":"Cosmic","rarity":"Uncommon","power":58,"defense":54,"speed":58,"emoji":"🔱","desc":"Bends light around herself to become translucent.","pack":2,"alliance":"Hero"},{"id":90,"name":"Ironmoth","type":"Flier","rarity":"Uncommon","power":54,"defense":52,"speed":74,"emoji":"🦋","desc":"Metallic wing-dust blinds sensors and organic eyes.","pack":2,"alliance":"Villain"},{"id":91,"name":"Aurora","type":"Elemental","rarity":"Uncommon","power":57,"defense":53,"speed":56,"emoji":"💡","desc":"Elena Solari, known as Aurora, is a cosmic-powered hero who can command the entire spectrum of light. After a mysterious celestial event infused her with radiant energy, she gained the ability to bend light into dazzling constructs, unleash powerful beams, and cloak herself in perfect invisibility. Draped in shimmering energy that mirrors the colors of the aurora borealis, she moves through the skies like a living prism. Aurora fights to protect Earth from threats both terrestrial and cosmic, believing that even the darkest moments can be illuminated. Wherever she appears, hope shines brighter than any shadow.","pack":2,"alliance":"Hero","imageUrl":"https://firebasestorage.googleapis.com/v0/b/hero-cards-1f345.firebasestorage.app/o/card-images%2Fcard_91.png?alt=media&token=1cb134af-51f0-418a-a4ef-78100cfdb71a"},{"id":92,"name":"Nocturna","type":"Stealth","rarity":"Uncommon","power":55,"defense":51,"speed":67,"emoji":"🌙","desc":"Gains full invisibility the moment the sun sets.","pack":2,"alliance":"Anti-Hero"},{"id":93,"name":"Runewarden","type":"Mystic","rarity":"Uncommon","power":56,"defense":60,"speed":49,"emoji":"🔮","desc":"Inscribes protective runes instantly on any surface.","pack":2,"alliance":"Hero"},{"id":94,"name":"Patchwork","type":"Gadgets","rarity":"Uncommon","power":50,"defense":58,"speed":51,"emoji":"⚙️","desc":"Repairs and repurposes destroyed tech in seconds.","pack":2,"alliance":"Hero"},{"id":95,"name":"Surgewolf","type":"Brawler","rarity":"Uncommon","power":58,"defense":55,"speed":58,"emoji":"🐺","desc":"Channels electrical surges through every heavy punch.","pack":2,"alliance":"Hero"},{"id":96,"name":"Pallida","type":"Healer","rarity":"Uncommon","power":43,"defense":63,"speed":52,"emoji":"💚","desc":"Purges any toxin or disease from a body.","pack":2,"alliance":"Hero"},{"id":97,"name":"Vexshot","type":"Blaster","rarity":"Uncommon","power":59,"defense":46,"speed":57,"emoji":"🎯","desc":"Bounces energy blasts off surfaces to hit blind spots.","pack":2,"alliance":"Hero"},{"id":98,"name":"Slipstream","type":"Speedster","rarity":"Uncommon","power":55,"defense":45,"speed":87,"emoji":"💨","desc":"Creates a vacuum wake that pulls enemies off balance.","pack":2,"alliance":"Hero"},{"id":99,"name":"Manticore","type":"Brawler","rarity":"Uncommon","power":60,"defense":57,"speed":52,"emoji":"🦂","desc":"Tail stinger injects paralyzing venom in combat.","pack":2,"alliance":"Anti-Hero"},{"id":100,"name":"Cinderella Nine","type":"Tech","rarity":"Uncommon","power":53,"defense":60,"speed":50,"emoji":"🤖","desc":"Remote-pilots nine combat drones simultaneously in battle.","pack":2,"alliance":"Hero"},{"id":101,"name":"Pebble","type":"Tank","rarity":"Common","power":30,"defense":55,"speed":32,"emoji":"🛡️","desc":"Tough enough to shrug off most civilian threats.","pack":1,"alliance":"Hero"},{"id":102,"name":"Arcanian","type":"Speedster","rarity":"Common","power":28,"defense":30,"speed":60,"emoji":"⚡","desc":"Gaius Varro Fulmen was the greatest runner in all of Rome — a celebrated soldier and athlete who once raced to deliver a battle-turning message across three provinces without stopping. During one legendary sprint along the Via Appia, Gaius pushed beyond all human limits and broke the barrier of time itself, arriving not at the next city, but two thousand years into the future. Disoriented but unbroken, he forged his soldier's discipline and battlefield instincts into the identity of Arcanian, channeling the electrical energy his impossible speed generates into devastating lightning-charged strikes. He still wears armor in the Roman tradition, a reminder of the world he lost and the honor code he refuses to abandon no matter what century surrounds him. Stuck in a present he barely understands — bewildered by smartphones yet unfazed by supervillains — Gaius fights on, because a Roman soldier doesn't stop, and he certainly function getLevel(xp){
  let level=1;
  for(let i=1;i<XP_THRESHOLDS.length;i++){if(xp>=XP_THRESHOLDS[i])level=i+1;else break;}
  return Math.min(level,100);
}
function getXpForCurrentLevel(xp){
  const level=getLevel(xp);
  return xp-(XP_THRESHOLDS[level-1]||0);
}
function getXpNeededForNextLevel(xp){
  const level=getLevel(xp);
  if(level>=100)return 0;
  return XP_THRESHOLDS[level]-(XP_THRESHOLDS[level-1]||0);
}

// Pick today's 3 quests (1 Easy, 1 Medium, 1 Hard) using date as seed
function getTodaysQuests(){
  const seed=parseInt(new Date().toISOString().slice(0,10).replace(/-/g,''));
  const seededRand=(n,offset=0)=>((seed+offset)*9301+49297)%233280/233280*n|0;
  const easy=DAILY_QUESTS.filter(q=>q.diff==='Easy');
  const medium=DAILY_QUESTS.filter(q=>q.diff==='Medium');
  const hard=DAILY_QUESTS.filter(q=>q.diff==='Hard');
  return[
    easy[seededRand(easy.length,0)],
    medium[seededRand(medium.length,1)],
    hard[seededRand(hard.length,2)],
  ];

function getRandom(ex=[],packId=null){
  const source=packId?ALL_CARDS.filter(c=>c.pack===packId):ALL_CARDS;
  const r=Math.random()*100;
  let rar=r<2.5?"Legendary":r<7.5?"Epic":r<22.5?"Rare":r<50?"Uncommon":"Common";
  let pool=source.filter(c=>c.rarity===rar&&!ex.includes(c.id));
  if(!pool.length)pool=source.filter(c=>!ex.includes(c.id));
  if(!pool.length)pool=source;
  return pool[Math.floor(Math.random()*pool.length)];
}

// Rarity gem shapes for bottom-right corner
const RARITY_GEMS={
  Common:   {shape:"circle",  color:"#b0b8c8"},
  Uncommon: {shape:"diamond", color:"#5ddb6a"},
  Rare:     {shape:"diamond", color:"#2196f3"},
  Epic:     {shape:"star",    color:"#cc6dff"},
  Legendary:{shape:"star",    color:"#ff9800"},
};

function RarityGem({rarity,size=10}){
  const g=RARITY_GEMS[rarity]||RARITY_GEMS.Common;
  if(g.shape==="circle") return <div style={{width:size,height:size,borderRadius:"50%",background:g.color,boxShadow:`0 0 ${size}px ${g.color}`}}/>;
  if(g.shape==="diamond") return(
    <div style={{width:size,height:size,background:g.color,transform:"rotate(45deg)",boxShadow:`0 0 ${size}px ${g.color}`}}/>
  );
  // star
  return(
    <svg width={size*1.4} height={size*1.4} viewBox="0 0 24 24">
      <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill={g.color} style={{filter:`drop-shadow(0 0 ${size/2}px ${g.color})`}}/>
    </svg>
  );
}

/* ── Pack animation ── */
// Rarity vibration patterns (ms: [vibrate, pause, vibrate, ...])
const RARITY_VIBRATION={
  Common:[30],
  Uncommon:[40,20,40],
  Rare:[60,30,60],
  Epic:[80,30,80,30,80],
  Legendary:[100,40,200,40,100,40,200],
};
// Rarity sound via Web Audio API
function playRaritySound(rarity){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const configs={
      Common:    [{f:300,t:0,d:0.08},{f:200,t:0.1,d:0.1}],
      Uncommon:  [{f:400,t:0,d:0.1},{f:500,t:0.12,d:0.15}],
      Rare:      [{f:500,t:0,d:0.1},{f:650,t:0.12,d:0.15},{f:800,t:0.28,d:0.2}],
      Epic:      [{f:600,t:0,d:0.1},{f:800,t:0.12,d:0.1},{f:1000,t:0.25,d:0.1},{f:1200,t:0.38,d:0.25}],
      Legendary: [{f:200,t:0,d:0.08},{f:400,t:0.1,d:0.08},{f:600,t:0.2,d:0.1},{f:900,t:0.32,d:0.1},{f:1200,t:0.45,d:0.15},{f:1500,t:0.62,d:0.4}],
    };
    const notes=configs[rarity]||configs.Common;
    notes.forEach(({f,t,d})=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type=rarity==="Legendary"?"sine":"square";
      osc.frequency.setValueAtTime(f,ctx.currentTime+t);
      gain.gain.setValueAtTime(rarity==="Legendary"?0.15:0.08,ctx.currentTime+t);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+d);
      osc.start(ctx.currentTime+t);
      osc.stop(ctx.currentTime+t+d+0.05);
    });
  }catch(e){}
}

    // Vibration
    if(navigator.vibrate){
      navigator.vibrate(RARITY_VIBRATION[rarity]||[30]);
    }
    // Sound
    playRaritySound(rarity);
    // Screen flash removed
  };

      triggerEffects(card.rarity);

/* ── CMS Card Editor ── */
function CardCMS({onSave,notify}){
  const [cards,setCards]=useState(()=>JSON.parse(JSON.stringify(ALL_CARDS)));
  const [search,setSearch]=useState("");
  const [editId,setEditId]=useState(null);
  const [draft,setDraft]=useState(null);
  const [filterRarity,setFilterRarity]=useState("All");
  const [filterPack,setFilterPack]=useState(0);
  const [filterType,setFilterType]=useState("All");
  const [saved,setSaved]=useState(false);
  const [uploadingImage,setUploadingImage]=useState(false);

  const types=["Speedster","Brainiac","Blaster","Tank","Healer","Stealth","Elemental","Tech","Mystic","Brawler","Flier","Shapeshifter","Cosmic","Alien","Gadgets"];
  const rarities=["Common","Uncommon","Rare","Epic","Legendary"];

  const openEdit=(card)=>{setDraft({...card});setEditId(card.id);};
  const closeEdit=()=>{setEditId(null);setDraft(null);};

  const saveEdit=async()=>{
    if(!draft)return;
    let finalDraft={...draft,id:Number(draft.id),power:Number(draft.power),defense:Number(draft.defense),speed:Number(draft.speed)};
    // Auto-migrate base64 image to Storage on save
    if(finalDraft.imageUrl&&finalDraft.imageUrl.startsWith("data:")){
      try{
        setUploadingImage(true);
        const res=await fetch(finalDraft.imageUrl);
        const blob=await res.blob();
        const ext=blob.type.split("/")[1]||"png";
        const path=`card-images/card_${finalDraft.id}.${ext}`;
        const ref=storage.ref(path);
        await ref.put(blob);
        const url=await ref.getDownloadURL();
        finalDraft={...finalDraft,imageUrl:url};
      }catch(err){console.error("Image migration failed:",err);}
      finally{setUploadingImage(false);}
    }
    const updated=cards.map(c=>c.id===finalDraft.id?finalDraft:c);
    setCards(updated);
    // Persist to ALL_CARDS in memory so rest of app sees changes
    updated.forEach((c,i)=>{ Object.assign(ALL_CARDS[i],c); });
    closeEdit();
    notify("Card updated!","#4caf50");
  };

  const exportCards=()=>{
    const blob=new Blob([JSON.stringify(cards,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="herocards_data.json";a.click();
    URL.revokeObjectURL(url);
    notify("Exported cards JSON!","#4fc3f7");
  };

  let filtered=[...cards];
  if(filterRarity!=="All")filtered=filtered.filter(c=>c.rarity===filterRarity);
  if(filterPack!==0)filtered=filtered.filter(c=>c.pack===filterPack);
  if(filterType!=="All")filtered=filtered.filter(c=>c.type===filterType);
  if(search)filtered=filtered.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||String(c.id).includes(search));

  const inputStyle={background:"#060610",border:"1px solid #1a2040",borderRadius:"8px",padding:"11px 14px",color:"#e8e8f0",fontFamily:"'Rajdhani',sans-serif",fontSize:"20px",outline:"none",width:"100%"};
  const labelStyle={fontFamily:"'Orbitron',monospace",fontSize:"13px",color:"#c0c4d8",letterSpacing:"2px",marginBottom:"6px",display:"block"};

  return(
    <div style={{padding:"28px 34px",animation:"fadeIn 0.3s ease-out"}}>

      {/* Edit modal */}
      {editId&&draft&&ReactDOM.createPortal(
        <div style={{position:"fixed",inset:0,background:"#000000e0",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:"28px"}}>
          <div style={{background:"#0a0a1e",border:"1px solid #ff9800aa",borderRadius:"22px",padding:"48px",width:"100%",maxWidth:"1100px",maxHeight:"92vh",overflowY:"auto"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"31px"}}>
              <div style={{fontFamily:"'Orbitron',monospace",fontSize:"20px",color:"#ff9800",letterSpacing:"2px"}}>EDITING CARD #{String(draft.id).padStart(3,"0")}</div>
              <button onClick={closeEdit} style={{background:"transparent",border:"1px solid #2a2a4a",borderRadius:"8px",padding:"6px 17px",color:"#c0c4d8",cursor:"pointer",fontSize:"20px"}}>✕</button>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px"}}>
              {/* ID */}
              <div>
                <label style={labelStyle}>CARD NUMBER</label>
                <input style={inputStyle} type="number" value={draft.id} onChange={e=>setDraft(d=>({...d,id:e.target.value}))}/>
              </div>
              {/* Emoji */}
              <div>
                <label style={labelStyle}>EMOJI</label>
                <input style={inputStyle} value={draft.emoji} onChange={e=>setDraft(d=>({...d,emoji:e.target.value}))}/>
              </div>
              {/* Name - full width */}
              <div style={{gridColumn:"1/-1"}}>
                <label style={labelStyle}>NAME</label>
                <input style={inputStyle} value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))}/>
              </div>
              {/* Type */}
              <div>
                <label style={labelStyle}>TYPE</label>
                <select style={{...inputStyle,cursor:"pointer"}} value={draft.type} onChange={e=>setDraft(d=>({...d,type:e.target.value}))}>
                  {types.map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              {/* Rarity */}
              <div>
                <label style={labelStyle}>RARITY</label>
                <select style={{...inputStyle,cursor:"pointer"}} value={draft.rarity} onChange={e=>setDraft(d=>({...d,rarity:e.target.value}))}>
                  {rarities.map(r=><option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              {/* Pack */}
              <div>
                <label style={labelStyle}>PACK</label>
                <select style={{...inputStyle,cursor:"pointer"}} value={draft.pack} onChange={e=>setDraft(d=>({...d,pack:Number(e.target.value)}))}>
                  <option value={1}>Infinite Waves</option>
                  <option value={2}>Shrouded Mysteries</option>
                </select>
              </div>
              {/* Alliance */}
              <div>
                <label style={labelStyle}>ALLIANCE</label>
                <select style={{...inputStyle,cursor:"pointer"}} value={draft.alliance||"Hero"} onChange={e=>setDraft(d=>({...d,alliance:e.target.value}))}>
                  {["Hero","Villain","Anti-Hero"].map(a=><option key={a} value={a}>{a}</option>)}
                </select>
              </div>
              {/* Stats */}
              {[["POWER","power"],["DEFENSE","defense"],["SPEED","speed"]].map(([label,key])=>(
                <div key={key}>
                  <label style={labelStyle}>{label}</label>
                  <input style={inputStyle} type="number" min="1" max="100" value={draft[key]} onChange={e=>setDraft(d=>({...d,[key]:e.target.value}))}/>
                </div>
              ))}
              {/* Desc - full width */}
              <div style={{gridColumn:"1/-1"}}>
                <label style={labelStyle}>DESCRIPTION</label>
                <textarea style={{...inputStyle,height:"101px",resize:"vertical"}} value={draft.desc} onChange={e=>setDraft(d=>({...d,desc:e.target.value}))}/>
              </div>
              {/* Hero Image - full width */}
              <div style={{gridColumn:"1/-1"}}>
                <label style={labelStyle}>HERO IMAGE</label>
                {/* Upload button */}
                <div style={{display:"flex",gap:"14px",alignItems:"center",marginBottom:"11px"}}>
                  <label style={{
                    background:uploadingImage?"#1a2040":"linear-gradient(135deg,#4fc3f7,#00e5ff)",border:"none",borderRadius:"11px",
                    padding:"13px 25px",fontFamily:"'Orbitron',monospace",fontSize:"15px",fontWeight:700,
                    color:uploadingImage?"#4fc3f7":"#060610",cursor:uploadingImage?"not-allowed":"pointer",letterSpacing:"1px",flexShrink:0,
                  }}>
                    {uploadingImage?"⏳ UPLOADING...":"📁 UPLOAD IMAGE"}
                    <input type="file" accept="image/*" style={{display:"none"}} onChange={async e=>{
                      const file=e.target.files[0];
                      if(!file)return;
                      if(file.size>5*1024*1024){alert("Image must be under 5MB");return;}
                      setUploadingImage(true);
                      try{
                        const ext=file.name.split('.').pop();
                        const path=`card-images/card_${draft.id}_${Date.now()}.${ext}`;
                        const ref=storage.ref(path);
                        await ref.put(file);
                        const url=await ref.getDownloadURL();
                        setDraft(d=>({...d,imageUrl:url}));
                        notify("Image uploaded!","#4caf50");
                      }catch(err){
                        console.error(err);
                        alert("Upload failed: "+err.message);
                      }finally{
                        setUploadingImage(false);
                      }
                    }}/>
                  </label>
                  <span style={{color:"#c8d0e0",fontSize:"15px",fontFamily:"monospace"}}>or paste a URL below</span>
                </div>
                <input style={inputStyle} value={(draft.imageUrl&&!draft.imageUrl.startsWith("data:"))?draft.imageUrl:""} placeholder="https://i.imgur.com/... (or use Upload button above)" onChange={e=>setDraft(d=>({...d,imageUrl:e.target.value.trim()||undefined}))}/>
                {draft.imageUrl&&(
                  <div style={{marginTop:"14px",display:"flex",alignItems:"center",gap:"17px",background:"#0a0a20",borderRadius:"11px",padding:"14px"}}>
                    <img
                      src={draft.imageUrl}
                      alt="preview"
                      style={{width:"101px",height:"101px",objectFit:"cover",objectPosition:"top",borderRadius:"8px",border:"1px solid #2a2a4a",flexShrink:0}}
                      onError={e=>{e.target.style.opacity="0.2";}}
                    />
                    <div style={{flex:1,fontSize:"15px",color:"#d0d4e8",fontFamily:"monospace",lineHeight:1.6}}>
                      {draft.imageUrl.startsWith("data:")
                        ? `⚠ Legacy base64 — re-upload to move to Storage`
                        : draft.imageUrl.includes("firebasestorage")
                          ? "✓ Stored in Firebase Storage"
                          : "✓ URL set"}
                      <br/>
                      <span style={{color:"#a0a8c0",fontSize:"14px"}}>Replaces emoji on card</span>
                    </div>
                    <button onClick={()=>setDraft(d=>({...d,imageUrl:undefined}))} style={{background:"transparent",border:"1px solid #ef535044",borderRadius:"8px",padding:"7px 17px",color:"#ef5350",cursor:"pointer",fontFamily:"monospace",fontSize:"15px",flexShrink:0}}>✕ Remove</button>
                  </div>
                )}
              </div>
            </div>

            {/* Preview */}
            <div style={{margin:"18px 0",display:"flex",justifyContent:"center"}}>
              <HeroCard card={{...draft,id:Number(draft.id),power:Number(draft.power),defense:Number(draft.defense),speed:Number(draft.speed)}} size="normal"/>
            </div>

            <div style={{display:"flex",gap:"14px",justifyContent:"flex-end"}}>
              <button onClick={closeEdit} style={{background:"transparent",border:"1px solid #2a2a4a",borderRadius:"11px",padding:"14px 31px",color:"#c0c4d8",cursor:"pointer",fontFamily:"'Orbitron',monospace",fontSize:"15px",letterSpacing:"1px"}}>CANCEL</button>
              <button onClick={saveEdit} style={{background:"linear-gradient(135deg,#4caf50,#00e676)",border:"none",borderRadius:"11px",padding:"14px 31px",fontFamily:"'Orbitron',monospace",fontSize:"15px",fontWeight:700,color:"#060610",cursor:"pointer",letterSpacing:"1px"}}>SAVE CHANGES</button>
            </div>
          </div>
        </div>,
        document.body
      )}

      {/* Header row */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"25px",flexWrap:"wrap",gap:"14px"}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:"20px",color:"#ff9800",letterSpacing:"2px"}}>⚡ CARD EDITOR — {cards.length} CARDS</div>
        <div style={{display:"flex",gap:"11px",flexWrap:"wrap"}}>
          {cards.filter(c=>c.imageUrl&&c.imageUrl.startsWith("data:")).length>0&&(
            <button onClick={async()=>{
              const base64Cards=cards.filter(c=>c.imageUrl&&c.imageUrl.startsWith("data:"));
              if(!auth.currentUser){
                alert("Please sign out of God Mode and log in with your real account before migrating images.");
                return;
              }
              notify(`Migrating ${base64Cards.length} images to Firebase Storage...`,"#ff9800");
              let migrated=0;
              const updated=[...cards];
              for(const card of base64Cards){
                try{
                  const res=await fetch(card.imageUrl);
                  const blob=await res.blob();
                  const ext=blob.type.split("/")[1]||"png";
                  const path=`card-images/card_${card.id}.${ext}`;
                  const ref=storage.ref(path);
                  await ref.put(blob);
                  const url=await ref.getDownloadURL();
                  const idx=updated.findIndex(c=>c.id===card.id);
                  updated[idx]={...updated[idx],imageUrl:url};
                  Object.assign(ALL_CARDS[idx],{imageUrl:url});
                  migrated++;
                }catch(err){console.error("Failed card",card.id,err);}
              }
              setCards(updated);
              notify(`✓ Migrated ${migrated} images to Firebase Storage!`,"#4caf50");
            }} style={{background:"linear-gradient(135deg,#ff9800,#ffc04a)",border:"none",borderRadius:"11px",padding:"11px 22px",color:"#060610",cursor:"pointer",fontFamily:"'Orbitron',monospace",fontSize:"14px",letterSpacing:"1px",fontWeight:700}}>
              ☁ MIGRATE {cards.filter(c=>c.imageUrl&&c.imageUrl.startsWith("data:")).length} IMAGES TO STORAGE
            </button>
          )}
          <button onClick={exportCards} style={{background:"transparent",border:"1px solid #4fc3f744",borderRadius:"11px",padding:"11px 22px",color:"#4fc3f7",cursor:"pointer",fontFamily:"'Orbitron',monospace",fontSize:"14px",letterSpacing:"1px"}}>⬇ EXPORT JSON</button>
        </div>
      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:"11px",flexWrap:"wrap",marginBottom:"14px"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name or ID..." style={{...inputStyle,width:"308px",fontSize:"18px"}}/>
        <select style={{...inputStyle,width:"auto",cursor:"pointer",fontSize:"18px"}} value={filterRarity} onChange={e=>setFilterRarity(e.target.value)}>
          <option value="All">All Rarities</option>
          {rarities.map(r=><option key={r} value={r}>{r}</option>)}
        </select>
        <select style={{...inputStyle,width:"auto",cursor:"pointer",fontSize:"18px"}} value={filterPack} onChange={e=>setFilterPack(Number(e.target.value))}>
          <option value={0}>All Packs</option>
          <option value={1}>Infinite Waves</option>
          <option value={2}>Shrouded Mysteries</option>
        </select>
        <select style={{...inputStyle,width:"auto",cursor:"pointer",fontSize:"18px"}} value={filterType} onChange={e=>setFilterType(e.target.value)}>
          <option value="All">All Types</option>
          {types.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
      </div>
      <div style={{fontSize:"17px",color:"#c0c4d8",fontFamily:"monospace",marginBottom:"22px"}}>{filtered.length} cards shown</div>

      {/* Card table */}
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"'Rajdhani',sans-serif",fontSize:"20px"}}>
          <thead>
            <tr style={{borderBottom:"1px solid #1a1a3a"}}>
              {["#","EMOJI","NAME","TYPE","RARITY","ALLIANCE","PACK","PWR","DEF","SPD",""].map(h=>(
                <th key={h} style={{padding:"11px 14px",textAlign:"left",fontFamily:"'Orbitron',monospace",fontSize:"13px",color:"#c0c4d8",letterSpacing:"1.5px",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(card=>{
              const cfg=RC[card.rarity];
              const tc=TYPE_COLORS[card.type]||"#888";
              return(
                <tr key={card.id} style={{borderBottom:"1px solid #0f0f24",transition:"background 0.1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#0d0d22"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{padding:"13px 14px",color:"#c0c4d8",fontFamily:"monospace",fontSize:"17px"}}>#{String(card.id).padStart(3,"0")}</td>
                  <td style={{padding:"13px 14px"}}>
                    {card.imageUrl?(
                      <img src={card.imageUrl.replace(/\/file\/d\/([^/]+)\/.*/,"https://drive.google.com/uc?export=view&id=$1")} alt="" style={{width:"45px",height:"45px",objectFit:"cover",objectPosition:"top",borderRadius:"6px",verticalAlign:"middle"}} onError={e=>{e.target.style.display="none";e.target.nextSibling.style.display="inline";}} />
                    ):null}
                    <span style={{fontSize:"28px",display:card.imageUrl?"none":"inline"}}>{card.emoji}</span>
                  </td>
                  <td style={{padding:"13px 14px",color:"#e8e8f0",fontWeight:600}}>{card.name}</td>
                  <td style={{padding:"13px 14px"}}><span style={{color:tc,fontFamily:"monospace",fontSize:"17px",fontWeight:600}}>{card.type}</span></td>
                  <td style={{padding:"13px 14px"}}><span style={{color:cfg.color,fontFamily:"'Orbitron',monospace",fontSize:"14px",fontWeight:700}}>{card.rarity}</span></td>
                  <td style={{padding:"13px 14px"}}>
                    {(()=>{const a=ALLIANCE_COLORS[card.alliance]||ALLIANCE_COLORS["Hero"];return<span style={{color:a.color,fontFamily:"'Orbitron',monospace",fontSize:"14px",fontWeight:700}}>{a.icon} {card.alliance||"Hero"}</span>})()}
                  </td>
                  <td style={{padding:"13px 14px",color:"#c0c4d8",fontSize:"17px"}}>{card.pack===1?"🌊":"🌑"}</td>
                  <td style={{padding:"13px 14px",color:"#ff7a50",fontFamily:"monospace"}}>{card.power}</td>
                  <td style={{padding:"13px 14px",color:"#60c4ff",fontFamily:"monospace"}}>{card.defense}</td>
                  <td style={{padding:"13px 14px",color:"#ffe566",fontFamily:"monospace"}}>{card.speed}</td>
                  <td style={{padding:"13px 14px"}}>
                    <button onClick={()=>openEdit(card)} style={{background:"#ff980018",border:"1px solid #ff980055",borderRadius:"8px",padding:"7px 20px",color:"#ff9800",cursor:"pointer",fontFamily:"'Orbitron',monospace",fontSize:"14px",letterSpacing:"1px",whiteSpace:"nowrap"}}>EDIT</button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}
