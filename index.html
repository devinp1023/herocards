/* ── Auth screen ── */
function AuthScreen({onLogin,godMode,onToggleGodMode,onEnterGodMode}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [username,setUsername]=useState("");
  const [password,setPassword]=useState("");
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);

  const friendlyError=(code)=>{
    const map={
      "auth/email-already-in-use":"Email already registered.",
      "auth/invalid-email":"Invalid email address.",
      "auth/weak-password":"Password must be at least 6 characters.",
      "auth/user-not-found":"No account found with that email.",
      "auth/wrong-password":"Incorrect password.",
      "auth/invalid-credential":"Incorrect email or password.",
      "auth/too-many-requests":"Too many attempts. Try again later.",
      "auth/network-request-failed":"Network error. Check your connection.",
    };
    return map[code]||"Something went wrong. Try again.";
  };

  const handle=async()=>{
    if(!email){setError("Enter your email.");return;}
    if(!password){setError("Enter your password.");return;}
    if(mode==="register"&&!username.trim()){setError("Enter a username.");return;}
    if(mode==="register"&&username.trim().length<3){setError("Username must be 3+ characters.");return;}
    setLoading(true);setError("");
    try{
      if(mode==="register"){
        // Check username not taken
        const snap=await db.collection("usernames").doc(username.trim().toLowerCase()).get();
        if(snap.exists){setError("Username already taken.");setLoading(false);return;}
        const cred=await auth.createUserWithEmailAndPassword(email,password);
        await db.collection("usernames").doc(username.trim().toLowerCase()).set({uid:cred.user.uid});
        await db.collection("users").doc(cred.user.uid).set({
          username:username.trim(),
          coins:350,
          collection:[],
          questDate:"",
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
        onLogin(cred.user.uid,username.trim(),{coins:350,collection:[],questDate:""});
      }else{
        const cred=await auth.signInWithEmailAndPassword(email,password);
        const snap=await db.collection("users").doc(cred.user.uid).get();
        const data=snap.data();
        onLogin(cred.user.uid,data.username,{coins:data.coins,collection:data.collection||[],questDate:data.questDate||""});
      }
    }catch(e){
      setError(friendlyError(e.code));
      setLoading(false);
    }
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"39px",background:"#060610"}}>
      <div style={{fontSize:"104px",animation:"float 3s ease-in-out infinite",marginBottom:"20px"}}>🦸</div>
      <div style={{fontFamily:"'Orbitron',monospace",fontSize:"45px",fontWeight:900,color:"#4fc3f7",letterSpacing:"3.4px",animation:"glow 3s ease-in-out infinite",marginBottom:"7px"}}>HERO CARDS</div>
      <div style={{fontSize:"20px",color:"#d0d4e8",letterSpacing:"3.4px",fontFamily:"monospace",marginBottom:"52px"}}>SUPERHERO COLLECTION</div>

      <div style={{width:"100%",maxWidth:"360px",background:"#0a0a1e",borderRadius:"22px",padding:"39px",border:"1px solid #12122a"}}>
        <div style={{display:"flex",marginBottom:"32px",borderRadius:"13px",overflow:"hidden",border:"1px solid #12122a"}}>
          {["login","register"].map(m=><button key={m} onClick={()=>{setMode(m);setError("");}} style={{flex:1,padding:"14px",background:mode===m?"#4fc3f7":"transparent",border:"none",color:mode===m?"#060610":"#d0d4e8",fontFamily:"'Orbitron',monospace",fontSize:"18px",cursor:"pointer",letterSpacing:"1.2px",fontWeight:700}}>{m==="login"?"SIGN IN":"REGISTER"}</button>)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"17px"}}>
          {mode==="register"&&<input value={username} onChange={e=>setUsername(e.target.value)} placeholder="Username (shown in game)" onKeyDown={e=>e.key==="Enter"&&handle()}/>}
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email address" onKeyDown={e=>e.key==="Enter"&&handle()}/>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder={mode==="register"?"Password (min 6 chars)":"Password"} onKeyDown={e=>e.key==="Enter"&&handle()}/>
          {error&&<div style={{color:"#ef5350",fontSize:"20px",fontFamily:"monospace",textAlign:"center",lineHeight:1.5}}>{error}</div>}
          <button onClick={handle} disabled={loading} style={{background:loading?"#a0a8c0":"linear-gradient(135deg,#4fc3f7,#00e5ff)",border:"none",borderRadius:"13px",padding:"21px",fontFamily:"'Orbitron',monospace",fontSize:"22px",fontWeight:700,color:"#060610",cursor:loading?"not-allowed":"pointer",letterSpacing:"2.3px",marginTop:"7px",display:"flex",alignItems:"center",justifyContent:"center",gap:"13px"}}>
            {loading?<><Spinner size={16} color="#4fc3f7"/><span>LOADING...</span></>:(mode==="login"?"ENTER":"CREATE ACCOUNT")}
          </button>
        </div>
      </div>
      <div style={{marginTop:"22px",fontSize:"17px",color:"#a0a8c0",fontFamily:"monospace",textAlign:"center"}}>
        Syncs across all your devices · Secured by Firebase
      </div>

      {/* God mode section */}
      <div style={{marginTop:"52px",width:"100%",maxWidth:"360px"}}>
        <div style={{borderTop:"1px solid #0f0f24",paddingTop:"20px",display:"flex",flexDirection:"column",alignItems:"center",gap:"20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"20px"}}>
            <span style={{fontFamily:"'Orbitron',monospace",fontSize:"21px",color:"#d0d4e8",letterSpacing:"2.3px"}}>GOD MODE</span>
            {/* Toggle switch */}
            <div onClick={onToggleGodMode} style={{width:"71px",height:"39px",borderRadius:"20px",background:godMode?"#ff9800":"#a0a8c0",border:`1px solid ${godMode?"#ff9800":"#c0c4d8"}`,cursor:"pointer",position:"relative",transition:"all 0.2s",flexShrink:0}}>
              <div style={{position:"absolute",top:"3px",left:godMode?"22px":"3px",width:"25px",height:"25px",borderRadius:"50%",background:godMode?"#060610":"#c8ccde",transition:"left 0.2s"}}/>
            </div>
            <span style={{fontFamily:"'Orbitron',monospace",fontSize:"21px",color:godMode?"#ff9800":"#d0d4e8",letterSpacing:"1.2px"}}>{godMode?"ON":"OFF"}</span>
          </div>
          {godMode&&(
            <button onClick={onEnterGodMode} style={{background:"linear-gradient(135deg,#ff6b00,#ff9800)",border:"none",borderRadius:"13px",padding:"18px 52px",fontFamily:"'Orbitron',monospace",fontSize:"20px",fontWeight:700,color:"#060610",cursor:"pointer",letterSpacing:"2.3px",animation:"pulse 2s ease-in-out infinite"}}>
              ⚡ ENTER AS GOD
            </button>
          )}
          {godMode&&<div style={{fontSize:"20px",color:"#ff980099",fontFamily:"monospace",textAlign:"center",lineHeight:1.6}}>All 200 cards unlocked · 99999 credits<br/>No login required · Nothing is saved</div>}
          {!godMode&&<div style={{fontSize:"17px",color:"#a0a8c0",fontFamily:"monospace",textAlign:"center"}}>Enable to test without logging in</div>}
        </div>
      </div>
    </div>
  );
}

/* ── Main Game ── */

/* ── src/game.js ── */
function Game({uid,username,initData,onLogout,isGod=false}){
  const [tab,setTab]=useState("home");
  const [showPackSelect,setShowPackSelect]=useState(false);
  const [ownedAvatars,setOwnedAvatars]=useState(()=>initData.ownedAvatars||["a1"]);
  const [activeAvatar,setActiveAvatar]=useState(()=>initData.activeAvatar||"a1");
  const [showAvatarModal,setShowAvatarModal]=useState(false);
  const [xp,setXp]=useState(()=>initData.xp||0);
  const [showLevelUp,setShowLevelUp]=useState(null);
  const [earnedAchievements,setEarnedAchievements]=useState(()=>initData.earnedAchievements||[]);
  const [packsOpened,setPacksOpened]=useState(()=>initData.packsOpened||0);
  const [packTradedIds,setPackTradedIds]=useState(new Set());
  const [tradesCompleted,setTradesCompleted]=useState(()=>initData.tradesCompleted||0);
  const [pendingAchievements,setPendingAchievements]=useState([]); // {level, avatar?}
  const [coins,setCoins]=useState(initData.coins||350);
  const [collection,setCollection]=useState(initData.collection||[]);
  const [openingPack,setOpeningPack]=useState(null);
  const [selectedPack,setSelectedPack]=useState(null);
  const [packFilter,setPackFilter]=useState(0); // 0=All, 1=pack1, 2=pack2
  const [sortBy,setSortBy]=useState('rarity');
  const rarities=["All","Common","Uncommon","Rare","Epic","Legendary"];
  const types=["All",...[...new Set(ALL_CARDS.map(c=>c.type))].sort()];
  const [selectedCard,setSelectedCard]=useState(null);
  const [filter,setFilter]=useState("All");
  const [rarityFilter,setRarityFilter]=useState("All");
  const [notification,setNotification]=useState(null);
  const [questDate,setQuestDate]=useState(initData.questDate||"");
  const [questProgress,setQuestProgress]=useState(()=>initData.questProgress||{});
  const todaysQuests=getTodaysQuests();
  const today=new Date().toDateString();
  const isNewDay=questDate!==today;
  // Reset progress if it's a new day
  const activeQuestProgress=isNewDay?{}:questProgress;
  const [saving,setSaving]=useState(false);
  const [search,setSearch]=useState("");
  const [showMissing,setShowMissing]=useState(false);
  const [newCardIds,setNewCardIds]=useState(new Set());
  const [expandedDesc,setExpandedDesc]=useState(false);
  const [storeTab,setStoreTab]=useState("avatars");
  const [battleDeck,setBattleDeck]=useState([]);
  const [battleTier,setBattleTier]=useState(1);
  const [battleCooldowns,setBattleCooldowns]=useState({});
  const saveTimer=useRef(null);

  const questUsed=!isNewDay&&todaysQuests.every(q=>activeQuestProgress[q.id]>=(q.req.n||1));

  // Debounced save to Firestore — skipped in god mode
  const saveData=useCallback((nc,ncol,nqd,nqp)=>{
    if(isGod)return;
    setSaving(true);
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      try{
        await db.collection("users").doc(uid).update({
          coins:nc,
          collection:ncol,
          questDate:nqd,
          questProgress:nqp||questProgress,
          ownedAvatars,
          activeAvatar,
          xp,
          earnedAchievements,
          packsOpened,
          tradesCompleted,
          lastUpdated:firebase.firestore.FieldValue.serverTimestamp()
        });
      }catch(e){console.error("Save failed:",e);}
      setSaving(false);
    },800);
  },[uid]);

  const notify=(msg,color="#4fc3f7")=>{setNotification({msg,color});setTimeout(()=>setNotification(null),2600);};

  const gainXp=(amount)=>{
    setXp(prev=>{
      const oldLevel=getLevel(prev);
      const newXp=prev+amount;
      const newLevel=getLevel(newXp);
      if(newLevel>oldLevel){
        // Check for level-up avatar unlock
        const unlockedAvatar=LEVEL_AVATARS.find(a=>a.unlocksAt===newLevel);
        setShowLevelUp({level:newLevel,avatar:unlockedAvatar||null});
        if(unlockedAvatar){
          setOwnedAvatars(owned=>[...owned,unlockedAvatar.id]);
          setActiveAvatar(unlockedAvatar.id);
        }
        // Bonus credits on level up
        const bonus=newLevel*50;
        setCoins(c=>{
          const nc=c+bonus;
          return nc;
        });
      }
      return newXp;
    });
  };

  const buyPack=(packId)=>{
    if(coins<PACK_COST){notify("Not enough credits!","#ef5350");return;}
    const nc=coins-PACK_COST;
    const newCards=[];
    const usedIds=new Set();
    let attempts=0;
    while(newCards.length<5&&attempts<50){
      attempts++;
      const c=getRandom([...usedIds],packId);
      if(!usedIds.has(c.id)){
        usedIds.add(c.id);
        newCards.push(c);
      }
    }
    setCoins(nc);setOpeningPack(newCards);
    setSelectedPack(packId);
  };

  const onPackDone=()=>{
    const newCol=[...collection];
    openingPack.forEach(card=>{
      if(packTradedIds.has(card.id))return; // already traded for credits
      const ex=newCol.find(c=>c.id===card.id);
      if(ex) ex.count=(ex.count||1)+1;
      else newCol.push({...card,count:1,acquiredAt:Date.now()});
    });
    setPackTradedIds(new Set());
    setCollection(newCol);
    const best=openingPack.reduce((a,b)=>RO[a.rarity]<RO[b.rarity]?a:b);
    if(best.rarity==="Legendary")notify(`⚡ LEGENDARY: ${best.name}!`,"#ff9800");
    else if(best.rarity==="Epic")notify(`💥 EPIC: ${best.name}!`,"#9c27b0");
    else notify(`Pack opened! +${openingPack.length} heroes`);
    // Award XP: 100 for pack + 25 per Rare/Epic/Legendary
    const bonusXp=openingPack.filter(c=>["Rare","Epic","Legendary"].includes(c.rarity)).length*XP_AWARDS.rare_card;
    gainXp(XP_AWARDS.pack+bonusXp);
    // Mark newly acquired (non-dupe) cards
    const brandNew=openingPack.filter(c=>!collection.find(col=>col.id===c.id));
    if(brandNew.length>0)setNewCardIds(prev=>new Set([...prev,...brandNew.map(c=>c.id)]));
    const newPacksOpened=packsOpened+1;
    setPacksOpened(newPacksOpened);
    checkAchievements(newCol,newPacksOpened,null,null,null,null);
    // Advance daily quests
    advanceQuest('packs');
    const newCards=openingPack.filter(c=>!collection.find(col=>col.id===c.id));
    newCards.forEach(c=>{
      advanceQuest('newcards');
      advanceQuest('rarity',{rarity:c.rarity});
      advanceQuest('alliance',{alliance:c.alliance});
      advanceQuest('types');
    });
    setOpeningPack(null);setTab("collection");
    saveData(coins,newCol,questDate,questProgress);
  };

  const tradeCard=(card)=>{
    if(!card||!card.count||card.count<=1){notify("No duplicates to trade!","#ef5350");return;}
    const credits=DUPE_CREDITS[card.rarity]||0;
    const nc=coins+credits;
    const newCol=collection.map(c=>c.id===card.id?{...c,count:c.count-1}:c);
    setCoins(nc);
    setCollection(newCol);
    setSelectedCard({...card,count:card.count-1});
    gainXp(XP_AWARDS.trade);
    advanceQuest('trades');
    const newTrades=tradesCompleted+1;
    setTradesCompleted(newTrades);
    checkAchievements(newCol,null,newTrades,nc,null,null);
    notify(`Traded 1× ${card.name} for +${credits} 💎 & +${XP_AWARDS.trade} XP`,"#ffa060");
    saveData(nc,newCol,questDate,questProgress);
  };

  const onTradeDupes=(dupes)=>{
    if(!dupes||dupes.length===0)return;
    const totalCredits=dupes.reduce((s,c)=>s+DUPE_CREDITS[c.rarity],0);
    const nc=coins+totalCredits;
    setCoins(nc);
    const newTradesCompleted=tradesCompleted+dupes.length;
    setTradesCompleted(newTradesCompleted);
    setPackTradedIds(new Set(dupes.map(d=>d.id)));
    dupes.forEach(()=>{gainXp(XP_AWARDS.trade);advanceQuest('trades');});
    checkAchievements(collection,null,newTradesCompleted,nc,null,null);
    saveData(nc,collection,questDate,questProgress);
  };

  const onBattleComplete=(result,deckCardIds,tier,rewards)=>{
    // Award credits + XP
    const nc=coins+(rewards.credits||0);
    setCoins(nc);
    gainXp(rewards.xp||0);
    // Put used cards on cooldown until next midnight
    const expiry=getNextMidnight();
    setBattleCooldowns(prev=>{
      const next={...prev};
      deckCardIds.forEach(id=>{next[id]=expiry;});
      return next;
    });
    // Notify
    if(result.winner==='player'){
      notify(`⚔️ VICTORY! +${rewards.credits}💎 +${rewards.xp}XP`,"#ffd700");
    } else {
      notify(`💀 Defeat — +${rewards.credits}💎 +${rewards.xp}XP`,"#ef5350");
    }
    saveData(nc,collection,questDate,questProgress);
  };

  // Advance daily quest progress
  const advanceQuest=(type,opts={})=>{
    if(isNewDay){setQuestDate(today);setQuestProgress({});}
    const prog=isNewDay?{}:{...activeQuestProgress};
    let changed=false;
    todaysQuests.forEach(q=>{
      if((prog[q.id]||0)>=(q.req.n||1))return; // already done
      if(q.req.type!==type)return;
      // Check specific conditions
      if(type==='rarity'&&q.req.rarity!==opts.rarity)return;
      if(type==='alliance'&&q.req.alliance!==opts.alliance)return;
      prog[q.id]=(prog[q.id]||0)+1;
      changed=true;
      // Check if just completed
      if(prog[q.id]>=q.req.n){
        gainXp(q.xp);
        setCoins(c=>c+q.credits);
        notify(`✅ Quest complete: ${q.task} +${q.credits}💎`,"#ffd700");
      }
    });
    if(changed){
      setQuestProgress(prog);
      setQuestDate(today);
      saveData(coins,collection,today,prog);
    }
  };

  // Check and award achievements (tiered)
  const checkAchievements=(newCollection,newPacksOpened,newTradesCompleted,newCoins,newXp,newOwnedAvatars)=>{
    const col=newCollection||collection;
    const packs=newPacksOpened??packsOpened;
    const trades=newTradesCompleted??tradesCompleted;
    const coins_=newCoins??coins;
    const owned=newOwnedAvatars||ownedAvatars;
    const xp_=newXp??xp;
    const level=getLevel(xp_);
    const newlyEarned=[];

    const check=(id,condition)=>{
      if(condition&&!earnedAchievements.includes(id)&&!newlyEarned.includes(id)){
        newlyEarned.push(id);
      }
    };

    // Helper values
    const purchasedAvatarCount=owned.filter(id=>!id.startsWith('lv')&&id!=='a1'||(AVATARS.find(a=>a.id===id))).length;
    const typeCount=[...new Set(col.map(c=>c.type))].length;
    const pack1Pct=ALL_CARDS.filter(c=>c.pack===1).length>0?Math.round(col.filter(c=>c.pack===1).length/ALL_CARDS.filter(c=>c.pack===1).length*100):0;
    const pack2Pct=ALL_CARDS.filter(c=>c.pack===2).length>0?Math.round(col.filter(c=>c.pack===2).length/ALL_CARDS.filter(c=>c.pack===2).length*100):0;

    ACHIEVEMENTS.forEach(ach=>{
      const r=ach.req;
      if(r.type==='col')        check(ach.id, col.length>=r.n);
      if(r.type==='packs')      check(ach.id, packs>=r.n);
      if(r.type==='rarity')     check(ach.id, col.filter(c=>c.rarity===r.rarity).length>=r.n);
      if(r.type==='level')      check(ach.id, level>=r.n);
      if(r.type==='trades')     check(ach.id, trades>=r.n);
      if(r.type==='avatars')    check(ach.id, purchasedAvatarCount>=r.n);
      if(r.type==='alliance')   check(ach.id, col.filter(c=>c.alliance===r.alliance).length>=r.n);
      if(r.type==='types')      check(ach.id, typeCount>=r.n);
      if(r.type==='pack')       check(ach.id, r.pack===1?pack1Pct>=r.pct:pack2Pct>=r.pct);
    });

    if(newlyEarned.length>0){
      const newEarned=[...earnedAchievements,...newlyEarned];
      setEarnedAchievements(newEarned);
      setPendingAchievements(q=>[...q,...newlyEarned]);
      let bonusXp=0, bonusCredits=0;
      newlyEarned.forEach(id=>{
        const ach=ACHIEVEMENTS.find(a=>a.id===id);
        if(ach){bonusXp+=ach.xp;bonusCredits+=ach.credits;}
      });
      if(bonusXp>0) gainXp(bonusXp);
      if(bonusCredits>0) setCoins(c=>c+bonusCredits);
    }
  }

  const earnCoins=()=>{
    if(questUsed){notify("Mission already complete!","#ef5350");return;}
    const nc=coins+80;setCoins(nc);setQuestDate(today);
    gainXp(XP_AWARDS.daily);
    checkAchievements(null,null,null,nc,null,null);
    notify("+80 credits & +50 XP! ⚡","#4caf50");
    saveData(nc,collection,today,questProgress);
  };

  let filtered=collection;
  if(packFilter!==0)filtered=filtered.filter(c=>c.pack===packFilter);
  if(filter!=="All")filtered=filtered.filter(c=>c.type===filter);
  if(rarityFilter!=="All")filtered=filtered.filter(c=>c.rarity===rarityFilter);
  if(search)filtered=filtered.filter(c=>c.name.toLowerCase().includes(search.toLowerCase()));
  const sorted=[...filtered].sort((a,b)=>{
    if(sortBy==='rarity') return (RO[a.rarity]||0)-(RO[b.rarity]||0)||a.name.localeCompare(b.name);
    if(sortBy==='name_az') return a.name.localeCompare(b.name);
    if(sortBy==='name_za') return b.name.localeCompare(a.name);
    if(sortBy==='count_hl') return (b.count||1)-(a.count||1);
    if(sortBy==='acquired_new') return (b.acquiredAt||0)-(a.acquiredAt||0);
    if(sortBy==='acquired_old') return (a.acquiredAt||0)-(b.acquiredAt||0);
    return 0;
  });
  const statsByRarity=Object.keys(RC).map(r=>({r,count:collection.filter(c=>c.rarity===r).length,total:ALL_CARDS.filter(c=>c.rarity===r).length,cfg:RC[r]}));

  return(
    <div style={{minHeight:"100vh",background:"#060610",color:"#d0d4e8"}}>
      {notification&&<div style={{position:"fixed",top:"18px",left:"50%",transform:"translateX(-50%)",background:"#0a0a20",border:`1px solid ${notification.color}`,color:notification.color,padding:"12px 23px",borderRadius:"23px",fontFamily:"'Orbitron',monospace",fontSize:"17px",zIndex:400,animation:"slideDown 0.3s ease-out",whiteSpace:"nowrap",boxShadow:`0 4px 20px ${notification.color}44`}}>{notification.msg}</div>}

      {/* Header */}
      <div className="header-bar" style={{background:"linear-gradient(180deg,#0d0d22,#060610)",padding:"17px 29px",borderBottom:"1px solid #0f0f24",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div>
          <div style={{fontFamily:"'Orbitron',monospace",fontSize:"34px",fontWeight:900,letterSpacing:"3.4px",color:"#4fc3f7",animation:"glow 3s ease-in-out infinite"}}>HERO CARDS</div>
          <div style={{fontSize:"18px",color:"#c8ccde",letterSpacing:"2.3px",fontFamily:"monospace",display:"flex",alignItems:"center",gap:"10px"}}>
            <span>{username.toUpperCase()}</span>
            {saving&&<Spinner size={8} color="#4fc3f7"/>}
            {saving&&<span>SAVING</span>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"13px"}}>
          <div style={{background:"#0a0a20",border:"1px solid #4fc3f733",borderRadius:"32px",padding:"8px 20px",display:"flex",alignItems:"center",gap:"8px"}}>
            <span style={{fontSize:"21px"}}>💎</span>
            <span style={{fontFamily:"'Orbitron',monospace",color:"#4fc3f7",fontWeight:700,fontSize:"28px"}}>{coins}</span>
          </div>
          <button onClick={onLogout} title="Sign out" className="header-signout-btn" style={{background:"transparent",border:"1px solid #1a1a3a",borderRadius:"10px",padding:"8px 17px",color:"#c8ccde",cursor:"pointer",fontSize:"20px",display:"flex",alignItems:"center",gap:"8px",fontFamily:"'Rajdhani',sans-serif",fontWeight:600,letterSpacing:"1px"}}><span className="header-signout-text">🚪 </span>SIGN OUT</button>
        </div>
      </div>

      <div style={{display:"flex",minHeight:"calc(100vh - 57px)"}}>
        <Sidebar tab={tab} setTab={setTab} selectedCard={selectedCard} collection={collection} isGod={isGod}/>
        <div className="main-pad" style={{flex:1,overflowY:"auto"}}>

          {/* HOME */}
          {tab==="home"&&!showPackSelect&&(
            <div style={{padding:"48px 40px",animation:"fadeIn 0.3s ease-out",maxWidth:"1200px",margin:"0 auto"}}>

              {/* User profile section */}
              <div className="profile-card" style={{display:"flex",alignItems:"center",gap:"20px",marginBottom:"56px",background:"#0a0a1e",borderRadius:"28px",padding:"28px 32px",border:"1px solid #12122a",flexWrap:"wrap"}}>
                {/* Avatar - clickable */}
                <div onClick={()=>setShowAvatarModal(true)} className="profile-avatar" style={{width:"100px",height:"100px",borderRadius:"50%",background:"linear-gradient(135deg,#1a1a3a,#2a2a5a)",border:"3px solid #4fc3f755",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer",transition:"transform 0.2s,border-color 0.2s",position:"relative"}}
                  onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.08)";e.currentTarget.style.borderColor="#4fc3f7";}}
                  onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.borderColor="#4fc3f755";}}>
                  <span className="profile-avatar-emoji" style={{fontSize:"52px"}}>{(AVATARS.find(a=>a.id===activeAvatar)||LEVEL_AVATARS.find(a=>a.id===activeAvatar)||AVATARS[0]).emoji}</span>
                  <div style={{position:"absolute",bottom:"0px",right:"0px",width:"26px",height:"26px",borderRadius:"50%",background:"#4fc3f7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px"}}>✏️</div>
                </div>
                {/* Username + level */}
                <div className="profile-info" style={{flex:1,minWidth:0}}>
                  <div className="profile-username" style={{fontFamily:"'Orbitron',monospace",fontSize:"28px",fontWeight:900,color:"#ffffff",letterSpacing:"1px",marginBottom:"8px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{username.toUpperCase()}</div>
                  {(()=>{
                    const level=getLevel(xp);
                    const xpInLevel=getXpForCurrentLevel(xp);
                    const xpNeeded=getXpNeededForNextLevel(xp);
                    const pct=xpNeeded>0?Math.min((xpInLevel/xpNeeded)*100,100):100;
                    return(<>
                      <div style={{display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap",marginBottom:"10px"}}>
                        <div className="profile-level-badge" style={{background:"#4fc3f722",border:"1px solid #4fc3f755",borderRadius:"8px",padding:"4px 12px",fontFamily:"'Orbitron',monospace",fontSize:"30px",color:"#4fc3f7",fontWeight:700}}>
                          ⭐ LEVEL {level}
                        </div>
                        <div className="profile-cards-count" style={{fontSize:"30px",color:"#a0a8c0",fontFamily:"monospace"}}>
                          {collection.length}/{ALL_CARDS.length} cards
                        </div>
                      </div>
                      <div>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}>
                          <span className="profile-xp-text" style={{fontSize:"25px",color:"#a0a8c0",fontFamily:"monospace"}}>{xpInLevel.toLocaleString()} / {xpNeeded.toLocaleString()} XP</span>
                          {level<100&&<span className="profile-xp-text" style={{fontSize:"25px",color:"#4fc3f788",fontFamily:"monospace"}}>LVL {level+1}</span>}
                          {level===100&&<span className="profile-xp-text" style={{fontSize:"25px",color:"#ff9800",fontFamily:"monospace"}}>MAX LEVEL</span>}
                        </div>
                        <div style={{height:"8px",background:"#0f0f24",borderRadius:"4px",border:"1px solid rgba(255,255,255,0.15)"}}>
                          <div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#4fc3f7,#00e5ff)",borderRadius:"4px",transition:"width 0.5s",boxShadow:"0 0 8px #4fc3f766"}}/>
                        </div>
                      </div>
                    </>);
                  })()}
                </div>
                {/* Credits */}
                <div className="profile-credits" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",flexShrink:0}}>
                  <div className="profile-credits-amount" style={{fontFamily:"'Orbitron',monospace",fontSize:"32px",fontWeight:900,color:"#4fc3f7",lineHeight:1}}>{coins.toLocaleString()}</div>
                  <div style={{fontSize:"13px",color:"#a0a8c0",fontFamily:"monospace"}}>💎 CREDITS</div>
                </div>
              </div>

              {/* Action buttons */}
              <div style={{display:"flex",flexDirection:"column",gap:"22px",marginBottom:"56px"}}>
                <button onClick={()=>setShowPackSelect(true)} className="home-openpack-btn" style={{
                  width:"100%",background:"linear-gradient(135deg,#4fc3f7,#00e5ff)",
                  border:"none",borderRadius:"28px",padding:"42px",
                  fontFamily:"'Orbitron',monospace",fontSize:"39px",fontWeight:900,
                  color:"#060610",cursor:"pointer",letterSpacing:"3px",
                  boxShadow:"0 0 50px #4fc3f755",animation:"powerUp 2s ease-in-out infinite",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:"22px",
                }}>
                  🃏 OPEN A PACK

/* ── Root ── */
function App(){
  const [state,setState]=useState("loading");
  const [userData,setUserData]=useState(null);
  const [godMode,setGodMode]=useState(()=>localStorage.getItem(GOD_MODE_KEY)==="true");

  const toggleGodMode=()=>{
    const next=!godMode;
    setGodMode(next);
    localStorage.setItem(GOD_MODE_KEY,String(next));
    if(state==="game"&&userData?.uid==="god"){setState("auth");setUserData(null);}
  };

  useEffect(()=>{
    if(godMode){setState("auth");return;}
    const unsub=auth.onAuthStateChanged(async(user)=>{
      if(user){
        try{
          const snap=await db.collection("users").doc(user.uid).get();
          const data=snap.data();
          setUserData({uid:user.uid,username:data.username,coins:data.coins,collection:data.collection||[],questDate:data.questDate||"",ownedAvatars:data.ownedAvatars||["a1"],activeAvatar:data.activeAvatar||"a1",xp:data.xp||0,earnedAchievements:data.earnedAchievements||[],packsOpened:data.packsOpened||0,tradesCompleted:data.tradesCompleted||0,questProgress:data.questProgress||{}});
          setState("game");
        }catch(e){setState("auth");}
      }else{setState("auth");}
    });
    return()=>unsub();
  },[godMode]);

  const handleLogin=(uid,username,data)=>{
    setUserData({uid,username,...data});
    setState("game");
  };

  const handleLogout=async()=>{
    if(userData?.uid!=="god")await auth.signOut();
    setUserData(null);
    setState("auth");
  };

  const enterGodMode=()=>{
    setUserData(GOD_USER);
    setState("game");
  };

  if(state==="loading")return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#060610",flexDirection:"column",gap:"30px"}}>
      <div style={{fontSize:"109px",animation:"float 2s ease-in-out infinite"}}>🦸</div>
      <div style={{fontFamily:"'Orbitron',monospace",fontSize:"31px",color:"#4fc3f7",letterSpacing:"3px",animation:"glow 2s ease-in-out infinite"}}>CONNECTING</div>
      <Spinner size={24} color="#4fc3f7"/>
    </div>
  );
  if(state==="auth")return <AuthScreen onLogin={handleLogin} godMode={godMode} onToggleGodMode={toggleGodMode} onEnterGodMode={enterGodMode}/>;

  const isGod=userData?.uid==="god";
  return(
    <>
      {isGod&&(
        <div className="god-banner" style={{background:"#ff9800",color:"#060610",padding:"9px 24px",fontFamily:"'Orbitron',monospace",fontSize:"20px",letterSpacing:"2px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"fixed",top:0,left:0,right:0,zIndex:9000}}>
          <span>⚡ GOD MODE ACTIVE — NO DATA IS SAVED</span>
          <button onClick={toggleGodMode} style={{background:"#060610",color:"#ff9800",border:"none",borderRadius:"6px",padding:"4px 15px",fontFamily:"'Orbitron',monospace",fontSize:"17px",cursor:"pointer",letterSpacing:"1px"}}>DISABLE</button>
        </div>
      )}
      <div style={isGod?{paddingTop:"29px"}:{}}>
        <Game key={userData.uid} uid={userData.uid} username={userData.username} initData={{coins:userData.coins,collection:userData.collection,questDate:userData.questDate,ownedAvatars:userData.ownedAvatars||["a1"],activeAvatar:userData.activeAvatar||"a1",xp:userData.xp||0,earnedAchievements:userData.earnedAchievements||[],packsOpened:userData.packsOpened||0,tradesCompleted:userData.tradesCompleted||0,questProgress:userData.questProgress||{}}} onLogout={handleLogout} isGod={isGod}/>
      </div>
    </>
  );
}

/* ── src/battle-engine.js ── */
/* ═══════════════════════════════════════════════════════════════════
   BATTLE ENGINE  —  Session 1: Combat Engine
   Pure JS / no React / no Firebase.
   All functions are exported as globals for use by battle-ui.js.
   ═══════════════════════════════════════════════════════════════════ */

/* ── 1. TYPE SYSTEM ─────────────────────────────────────────────── */

const BATTLE_TYPE_MAP = {
  Brawler:'Melee',    Tank:'Melee',         Alien:'Melee',
  Speedster:'Agility',Flier:'Agility',      Stealth:'Agility',
  Blaster:'Energy',   Elemental:'Energy',   Cosmic:'Energy',
  Tech:'Intelligence',Gadgets:'Intelligence',Brainiac:'Intelligence',
  Healer:'Magic',     Mystic:'Magic',       Shapeshifter:'Magic',
};

// Advantage cycle: Melee(0) → Agility(1) → Energy(2) → Intelligence(3) → Magic(4) → Melee
const BATTLE_CYCLE = ['Melee','Agility','Energy','Intelligence','Magic'];

function battleCategory(type){ return BATTLE_TYPE_MAP[type]||null; }

function getTypeMultiplier(atkType, defType){
  const a = BATTLE_CYCLE.indexOf(battleCategory(atkType));
  const d = BATTLE_CYCLE.indexOf(battleCategory(defType));
  if(a<0||d<0) return 1.0;
  const next = (a+1)%5;
  const prev = (a+4)%5;
  if(d===next) return 1.5;              // strong against
  if(d===prev||d===a) return 0.75;      // weak against (prev in cycle or same)
  return 1.0;                           // neutral
}

/* ── 2. HP & EFFECTIVE STATS ────────────────────────────────────── */

function calcMaxHp(card){
  return Math.round(100 + card.defense * 0.5);
}

// Effective stats account for mid-battle modifiers (Fortify, Apex Predator, etc.)
function effPower(bc){
  let p = bc.power;
  if(bc._apexMult>1) p = Math.round(p * bc._apexMult);
  return p;
}
function effDefense(bc){
  let d = bc.defense + bc._fortifyBonus;
  if(bc._apexMult>1) d = Math.round(bc.defense * bc._apexMult) + bc._fortifyBonus;
  return d;
}
function effSpeed(bc){
  // Apex Predator speed increase applies from the following round — tracked via _apexSpeedNext
  let s = bc.speed;
  if(bc._apexSpeedMult>1) s = Math.round(s * bc._apexSpeedMult);
  return s;
}

/* ── 3. BATTLE CARD INIT ────────────────────────────────────────── */

function initBattleCard(card, fullDeck){
  const bc = {
    ...card,
    hp:       calcMaxHp(card),
    maxHp:    calcMaxHp(card),
    ability:  card.ability || null,

    // ── one-time flags ──
    _shieldUsed:      false,   // Shield Up
    _smokeUsed:       false,   // Smoke Screen
    _adaptableUsed:   false,   // Adaptable
    _secondWindUsed:  false,   // Second Wind
    _lastStandUsed:   false,   // Last Stand
    _lastStandActive: false,   // Last Stand +50% atk active

    // ── stack counters ──
    _unstoppableLeft: 3,       // Unstoppable attacks remaining
    _fortifyBonus:    0,       // Fortify defence accumulator
    _momentumStacks:  0,       // Momentum kill streak
    _apexMult:        1,       // Apex Predator power/defence multiplier
    _apexSpeedMult:   1,       // Apex Predator speed (applied next round)

    // ── active DoT / debuffs on this card ──
    _bleedRoundsLeft: 0,
    _bleedDmgPerRound:0,
    _dominateDebuff:  false,   // Dominate −25% atk

    // ── bonus flags set at entry or deck-assembly ──
    _packTactics:     false,   // Pack Tactics +15% dmg
    _reboundBonus:    false,   // Rebound +15% dmg
  };

  // Pack Tactics: check at deck-assembly time
  if(bc.ability==='Pack Tactics' && fullDeck){
    const ownCat = battleCategory(bc.type);
    bc._packTactics = fullDeck.some(c => c.id!==bc.id && battleCategory(c.type)===ownCat);
  }

  return bc;
}

/* ── 4. SIDE STATE INIT ─────────────────────────────────────────── */

function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }

function initSideState(deck){
  const cards = shuffle(deck).map(c => initBattleCard(c, deck));
  // active=cards[0], hand=cards[1-4], deck=cards[5-9]
  return {
    active:   cards[0],
    hand:     cards.slice(1,5),
    deck:     cards.slice(5),
    defeated: [],
    attackMult:       1.0,  // Intimidate debuff (−15%)
    intimidated:      false,
    pendingRebound:   false, // next card entering this side gets +15% dmg (Rebound)
    pendingDominate:  false, // next card entering this side gets −25% atk (Dominate)
  };
}

/* ── 5. IMMUNITY HELPER ─────────────────────────────────────────── */

function isImmune(bc){ return bc.ability==='Immunity'; }

/* ── 6. ENTRY EFFECTS ───────────────────────────────────────────── */
// Called whenever a card becomes the active card on 'side'.

function applyEntryEffects(bc, side, opponentSide, log){
  // Rebound bonus (set by previous card on same side)
  if(side.pendingRebound){
    bc._reboundBonus = true;
    side.pendingRebound = false;
    log.push({type:'ABILITY',ability:'Rebound',card:bc.name,side:side===opponentSide?'ai':'player',
      effect:'+15% damage this card'});
  }
  // Dominate debuff (set by opponent's last kill)
  if(side.pendingDominate && !isImmune(bc)){
    bc._dominateDebuff = true;
    side.pendingDominate = false;
    log.push({type:'ABILITY',ability:'Dominate',card:bc.name,side:side===opponentSide?'ai':'player',
      effect:'−25% attack this card'});
  }
  // Intimidate: if THIS card has Intimidate, debuff the opponent side
  if(bc.ability==='Intimidate' && !opponentSide.intimidated){
    opponentSide.attackMult *= 0.85;
    opponentSide.intimidated = true;
    log.push({type:'ABILITY',ability:'Intimidate',card:bc.name,
      effect:'Opponent attack −15% for remainder of battle'});
  }
}

/* ── 7. DRAW ────────────────────────────────────────────────────── */

function drawCard(side){
  if(side.deck.length>0){ side.hand.push(side.deck.shift()); return true; }
  return false;
}

/* ── 8. AI CARD SELECTION ───────────────────────────────────────── */
// Returns the card the AI will play from its hand given the opponent's active type.

function aiSelectCard(hand, opponentActiveType){
  if(!hand.length) return null;
  const totalStat = c => c.power + c.defense + c.speed;

  // Priority 1: type advantage
  const adv = hand.filter(c => getTypeMultiplier(c.type,opponentActiveType)===1.5);
  if(adv.length) return adv.reduce((b,c)=>totalStat(c)>totalStat(b)?c:b);

  // Priority 2: not weak to opponent
  const notWeak = hand.filter(c => getTypeMultiplier(c.type,opponentActiveType)!==0.75);
  if(notWeak.length) return notWeak.reduce((b,c)=>totalStat(c)>totalStat(b)?c:b);

  // Priority 3: all cards weak — highest stat
  return hand.reduce((b,c)=>totalStat(c)>totalStat(b)?c:b);
}

/* ── 9. EXECUTE ONE ATTACK ──────────────────────────────────────── */
// Follows the PRD resolution order:
//   1. type multiplier (+ ability modifiers)
//   2. damage = power × multiplier
//   3. defence reduction
//   4. damage floor (min 1)
//   5. on-damage triggers (Counterstrike, Bleed, Drain)
//   6. on-defeat check   → resolved by caller
//   7. post-round        → resolved by caller
//
// Returns { damage, killed }

function executeAttack(atk, def, atkSide, defSide, log){

  /* ─ Step 1: type multiplier ─ */
  let mult = getTypeMultiplier(atk.type, def.type);

  // Adaptable (defender): first type-advantage attack → neutral, one-time
  if(def.ability==='Adaptable' && !def._adaptableUsed && mult===1.5){
    def._adaptableUsed = true;
    mult = 1.0;
    log.push({type:'ABILITY',ability:'Adaptable',card:def.name,effect:'Type advantage reduced to neutral'});
  }
  // Unstoppable (attacker): first 3 attacks ignore type disadvantage
  if(atk.ability==='Unstoppable' && atk._unstoppableLeft>0 && mult===0.75){
    atk._unstoppableLeft--;
    mult = 1.0;
    log.push({type:'ABILITY',ability:'Unstoppable',card:atk.name,
      effect:`Type disadvantage ignored (${atk._unstoppableLeft} left)`});
  }
  // Overwhelm (attacker): type advantage → ×2.0 instead of ×1.5
  if(atk.ability==='Overwhelm' && mult===1.5){
    mult = 2.0;
    log.push({type:'ABILITY',ability:'Overwhelm',card:atk.name,effect:'Type advantage ×2.0'});
  }

  /* ─ Step 2-3: base damage ─ */
  let atkPow = effPower(atk);

  // Attacker debuffs
  atkPow = Math.round(atkPow * atkSide.attackMult);              // Intimidate
  if(atk._dominateDebuff && !isImmune(atk)){                    // Dominate
    atkPow = Math.round(atkPow * 0.75);
  }

  const defVal = effDefense(def) * 0.5;

  /* ─ Step 4: damage floor ─ */
  let dmg = Math.max(1, Math.round(atkPow * mult - defVal));

  /* ─ Attacker outgoing modifiers ─ */
  if(atk.ability==='Adrenaline' && atk.hp < atk.maxHp*0.3)
    dmg = Math.ceil(dmg*1.2);
  if(atk.ability==='Momentum' && atk._momentumStacks>0)
    dmg = Math.ceil(dmg*(1+atk._momentumStacks*0.1));
  if(atk.ability==='Pack Tactics' && atk._packTactics)
    dmg = Math.ceil(dmg*1.15);
  if(atk._reboundBonus)
    dmg = Math.ceil(dmg*1.15);
  if(atk._lastStandActive)
    dmg = Math.ceil(dmg*1.5);
  if(atk.ability==='Execute' && def.hp < def.maxHp*0.25)
    dmg = dmg*2;
  if(atk.ability==='Opportunist' && def.hp < def.maxHp*0.4)
    dmg = Math.ceil(dmg*1.2);

  /* ─ Defender incoming modifiers ─ */
  // Grit: −15% damage when HP < 50%
  if(def.ability==='Grit' && def.hp < def.maxHp*0.5 && !isImmune(def))
    dmg = Math.ceil(dmg*0.85);
  // Shield Up: first attack −30%, one-time
  if(def.ability==='Shield Up' && !def._shieldUsed){
    def._shieldUsed = true;
    dmg = Math.ceil(dmg*0.7);
    log.push({type:'ABILITY',ability:'Shield Up',card:def.name,effect:'First attack reduced 30%'});
  }
  // Smoke Screen: first attack 50% miss
  if(def.ability==='Smoke Screen' && !def._smokeUsed){
    def._smokeUsed = true;
    if(Math.random()<0.5){
      log.push({type:'ATTACK',attacker:atk.name,defender:def.name,
        damage:0,missed:true,typeMultiplier:mult,
        hpBefore:def.hp,hpAfter:def.hp,defenderMaxHp:def.maxHp});
      return {damage:0,killed:false};
    }
  }

  /* ─ Overwhelming Force: bonus damage ignoring defence (added after floor) ─ */
  let bonus = 0;
  if(atk.ability==='Overwhelming Force'){
    bonus = Math.max(1, Math.round(def.maxHp*0.1));
    dmg += bonus;
  }

  /* ─ Apply damage ─ */
  const hpBefore = def.hp;
  def.hp = Math.max(0, def.hp - dmg);

  log.push({
    type:'ATTACK',
    attacker:atk.name, attackerSide: atkSide._label,
    defender:def.name, defenderSide: defSide._label,
    damage:dmg, bonusDamage:bonus, typeMultiplier:mult,
    hpBefore, hpAfter:def.hp, defenderMaxHp:def.maxHp,
    missed:false,
  });

  /* ─ Step 5: on-damage triggers ─ */
  // Counterstrike (defender): 25% chance reflect ½ damage
  if(def.ability==='Counterstrike' && Math.random()<0.25){
    const reflected = Math.max(1, Math.floor(dmg*0.5));
    atk.hp = Math.max(0, atk.hp - reflected);
    log.push({type:'ABILITY',ability:'Counterstrike',card:def.name,
      effect:`Reflected ${reflected} dmg`,hpAfter:atk.hp});
  }
  // Bleed (attacker): apply DoT to defender (one instance, refreshes)
  if(atk.ability==='Bleed' && !isImmune(def)){
    def._bleedRoundsLeft  = 2;
    def._bleedDmgPerRound = Math.max(1, Math.round(def.maxHp*0.08));
    log.push({type:'ABILITY',ability:'Bleed',card:atk.name,
      effect:`Bleed applied to ${def.name} (${def._bleedDmgPerRound}/round × 2)`});
  }
  // Drain (attacker): heal 25% of damage dealt
  if(atk.ability==='Drain'){
    const heal = Math.max(1, Math.round(dmg*0.25));
    atk.hp = Math.min(atk.maxHp, atk.hp + heal);
    log.push({type:'ABILITY',ability:'Drain',card:atk.name,effect:`Drained +${heal} HP`});
  }

  /* ─ Death check ─ */
  if(def.hp<=0){
    // Second Wind: survive killing blow, restore 20% HP
    if(def.ability==='Second Wind' && !def._secondWindUsed){
      def._secondWindUsed = true;
      def.hp = Math.ceil(def.maxHp*0.2);
      log.push({type:'ABILITY',ability:'Second Wind',card:def.name,
        effect:`Survived! HP restored to ${def.hp}`});
      return {damage:dmg, killed:false};
    }
    // Last Stand: survive with 1 HP, gain +50% attack
    if(def.ability==='Last Stand' && !def._lastStandUsed){
      def._lastStandUsed  = true;
      def._lastStandActive= true;
      def.hp = 1;
      log.push({type:'ABILITY',ability:'Last Stand',card:def.name,
        effect:'Survived with 1 HP! +50% attack'});
      return {damage:dmg, killed:false};
    }
    log.push({type:'DEFEAT',card:def.name,byCard:atk.name});
    return {damage:dmg, killed:true};
  }

  return {damage:dmg, killed:false};
}

/* ── 10. ON-KILL TRIGGERS ───────────────────────────────────────── */

function resolveKill(killer, killerSide, opponentSide, log){
  // Fortify: +8 defence (no HP change)
  if(killer.ability==='Fortify'){
    killer._fortifyBonus += 8;
    log.push({type:'ABILITY',ability:'Fortify',card:killer.name,
      effect:`Defence +8 (total bonus: +${killer._fortifyBonus})`});
  }
  // Momentum: +10% damage per consecutive kill
  if(killer.ability==='Momentum'){
    killer._momentumStacks++;
    log.push({type:'ABILITY',ability:'Momentum',card:killer.name,
      effect:`Damage +10% (${killer._momentumStacks} stack${killer._momentumStacks>1?'s':''})`});
  }
  // Apex Predator: Power/Defence/Speed each +8% per kill
  //   - Defence boost does not retroactively change HP
  //   - Speed takes effect from the following round (_apexSpeedMult applied at round start)
  if(killer.ability==='Apex Predator'){
    killer._apexMult = 1 + (killer._apexMult-1) + 0.08; // add 8% per stack
    killer._apexSpeedMult = killer._apexMult;            // speed for next round
    const pct = Math.round((killer._apexMult-1)*100);
    log.push({type:'ABILITY',ability:'Apex Predator',card:killer.name,
      effect:`All stats +${pct}% (speed applies next round)`});
  }
  // Dominate: next card opponent plays gets −25% attack
  if(killer.ability==='Dominate'){
    opponentSide.pendingDominate = true;
    log.push({type:'ABILITY',ability:'Dominate',card:killer.name,
      effect:"Next opponent card: −25% attack"});
  }
}

/* ── 11. ON-DEFEAT TRIGGERS ─────────────────────────────────────── */

function resolveDefeat(bc, side, log){
  // Rebound: next friendly card gets +15% damage
  if(bc.ability==='Rebound'){
    side.pendingRebound = true;
    log.push({type:'ABILITY',ability:'Rebound',card:bc.name,
      effect:'Next friendly card: +15% damage'});
  }
  // Momentum: stacks reset when this card is defeated
  if(bc.ability==='Momentum' && bc._momentumStacks>0){
    bc._momentumStacks = 0;
  }
  side.defeated.push(bc);
}

/* ── 12. CARD REPLACEMENT ───────────────────────────────────────── */
// Returns true if a new card was played, false if no cards remain.
// playerCardChoice(hand) → chosen card | null, used by the UI in Session 3.
// If not provided (simulation mode) the player auto-selects like AI would.

function handleReplacement(side, opponentSide, isPlayer, playerCardChoice, log){
  let next = null;
  let fromDeck = false;

  if(side.hand.length>0){
    if(isPlayer && playerCardChoice){
      next = playerCardChoice(side.hand);
    } else {
      next = aiSelectCard(side.hand, opponentSide.active.type);
    }
    side.hand = side.hand.filter(c=>c.id!==next.id);
  } else if(side.deck.length>0){
    next = side.deck.shift();
    fromDeck = true;
    log.push({type:'FORCED_DRAW',side:isPlayer?'player':'ai',card:next.name});
  } else {
    return false; // no cards left — battle over
  }

  side.active = next;
  applyEntryEffects(next, side, opponentSide, log);
  log.push({type:'CARD_ENTER',side:isPlayer?'player':'ai',
    card:next.name,rarity:next.rarity,hp:next.hp,maxHp:next.maxHp});
  return true;
}

/* ── 13. POST-ROUND TRIGGERS ────────────────────────────────────── */

function resolvePostRound(playerSide, aiSide, log){
  for(const [side,label] of [[playerSide,'player'],[aiSide,'ai']]){
    const bc = side.active;
    if(!bc) continue;
    // Bleed tick
    if(bc._bleedRoundsLeft>0){
      const dmg = bc._bleedDmgPerRound;
      bc.hp = Math.max(0, bc.hp-dmg);
      bc._bleedRoundsLeft--;
      log.push({type:'ABILITY',ability:'Bleed',card:bc.name,
        effect:`Bleed tick −${dmg} HP (${bc._bleedRoundsLeft} round${bc._bleedRoundsLeft!==1?'s':''} left)`,
        hpAfter:bc.hp, maxHp:bc.maxHp});
    }
    // Resilience: recover 5 HP
    if(bc.ability==='Resilience'){
      const heal = Math.min(5, bc.maxHp-bc.hp);
      if(heal>0){
        bc.hp += heal;
        log.push({type:'ABILITY',ability:'Resilience',card:bc.name,
          effect:`+${heal} HP`,hpAfter:bc.hp,maxHp:bc.maxHp});
      }
    }
  }
}

/* ── 14. BLEED DEATH CHECK ──────────────────────────────────────── */
// Called after resolvePostRound; returns true if battle ended.

function checkBleedDeaths(playerSide, aiSide, playerCardChoice, log){
  for(const [side,opSide,isPlayer] of [
    [playerSide, aiSide,   true ],
    [aiSide,     playerSide,false],
  ]){
    if(side.active && side.active.hp<=0){
      log.push({type:'DEFEAT',card:side.active.name,byCard:'Bleed'});
      resolveDefeat(side.active, side, log);
      const replaced = handleReplacement(side, opSide, isPlayer, playerCardChoice, log);
      if(!replaced){
        log.push({type:'BATTLE_END',winner:isPlayer?'ai':'player',reason:'bleed_lethal'});
        return true;
      }
    }
  }
  return false;
}

/* ── 15. FULL BATTLE SIMULATION ─────────────────────────────────── */
//
// playerDeck / aiDeck: arrays of card objects (from ALL_CARDS, with .ability field).
// playerCardChoice: optional fn(hand[]) → card, for UI-driven play (Session 3).
//   When omitted (simulation mode) the player auto-selects using AI logic.
//
// Returns:
//   { winner: 'player'|'ai', hasTenacity: bool, log: BattleEvent[] }

function runBattle(playerDeck, aiDeck, playerCardChoice){
  const log = [];

  const pSide = initSideState(playerDeck);  pSide._label = 'player';
  const aSide = initSideState(aiDeck);      aSide._label = 'ai';

  // Apply entry effects for the two opening active cards
  applyEntryEffects(pSide.active, pSide, aSide, log);
  applyEntryEffects(aSide.active, aSide, pSide, log);

  log.push({
    type:'BATTLE_START',
    playerActive:{name:pSide.active.name,rarity:pSide.active.rarity,
      hp:pSide.active.hp,maxHp:pSide.active.maxHp},
    aiActive:{name:aSide.active.name,rarity:aSide.active.rarity,
      hp:aSide.active.hp,maxHp:aSide.active.maxHp},
  });

  let round = 0;
  const SAFETY_CAP = 300; // should never be reached — battles always progress (min 1 dmg/round)

  while(round < SAFETY_CAP){
    round++;

    // Draw phase (each side draws if hand < 5)
    if(pSide.hand.length<5) drawCard(pSide);
    if(aSide.hand.length<5) drawCard(aSide);

    log.push({
      type:'ROUND_START', round,
      playerHp:pSide.active.hp, playerMaxHp:pSide.active.maxHp,
      aiHp:aSide.active.hp,     aiMaxHp:aSide.active.maxHp,
    });

    // Determine attack order for this round
    const pSpd = effSpeed(pSide.active);
    const aSpd = effSpeed(aSide.active);
    const playerFirst = pSpd>aSpd ? true : aSpd>pSpd ? false : Math.random()<0.5;

    const [first,  fSide,  fOpp ] = playerFirst ? [pSide.active,pSide,aSide] : [aSide.active,aSide,pSide];
    const [second, sSide,  sOpp ] = playerFirst ? [aSide.active,aSide,pSide] : [pSide.active,pSide,aSide];

    // ── First attacker ──
    const r1 = executeAttack(first, second, fSide, fOpp, log);

    if(r1.killed){
      resolveKill(first, fSide, fOpp, log);
      resolveDefeat(second, sSide, log);
      const survived = handleReplacement(sSide, fSide, sSide===pSide, playerCardChoice, log);
      if(!survived){
        log.push({type:'BATTLE_END',winner:sSide===pSide?'ai':'player'});
        break;
      }
    } else {
      // ── Second attacker ──
      const r2 = executeAttack(second, first, sSide, sOpp, log);

      if(r2.killed){
        resolveKill(second, sSide, sOpp, log);
        resolveDefeat(first, fSide, log);
        const survived = handleReplacement(fSide, sSide, fSide===pSide, playerCardChoice, log);
        if(!survived){
          log.push({type:'BATTLE_END',winner:fSide===pSide?'ai':'player'});
          break;
        }
      }
    }

    // Check if Counterstrike killed the attacker mid-round
    for(const [side,opSide,isPlayer] of [[pSide,aSide,true],[aSide,pSide,false]]){
      if(side.active && side.active.hp<=0 && !log.find(e=>e.type==='BATTLE_END')){
        log.push({type:'DEFEAT',card:side.active.name,byCard:'Counterstrike'});
        resolveDefeat(side.active, side, log);
        const survived = handleReplacement(side, opSide, isPlayer, playerCardChoice, log);
        if(!survived){
          log.push({type:'BATTLE_END',winner:isPlayer?'ai':'player'});
        }
      }
    }

    if(log.find(e=>e.type==='BATTLE_END')) break;

    // ── Post-round: Bleed ticks + Resilience heals ──
    resolvePostRound(pSide, aSide, log);

    if(checkBleedDeaths(pSide, aSide, playerCardChoice, log)) break;
  }

  // Safety cap fallback (should not occur)
  if(round>=SAFETY_CAP && !log.find(e=>e.type==='BATTLE_END')){
    log.push({type:'BATTLE_END',winner:'ai',reason:'safety_cap'});
  }

  const endEvent = log.find(e=>e.type==='BATTLE_END');
  const winner   = endEvent ? endEvent.winner : 'ai';

  return {
    winner,
    hasTenacity: playerDeck.some(c=>c.ability==='Tenacity'),
    log,
  };
}

/* ── 16. BATTLE REWARD CALCULATION ─────────────────────────────── */

const BATTLE_REWARDS = {
  1:{name:'Rookie',  winCredits:50,  winXp:100, lossCredits:10, lossXp:25},
  2:{name:'Scrapper',winCredits:100, winXp:150, lossCredits:15, lossXp:35},
  3:{name:'Fighter', winCredits:200, winXp:250, lossCredits:20, lossXp:50},
  4:{name:'Elite',   winCredits:350, winXp:375, lossCredits:30, lossXp:75},
  5:{name:'Champion',winCredits:600, winXp:500, lossCredits:50, lossXp:100},
};

// streak: current win streak BEFORE this battle
function calcBattleRewards(tier, winner, streak){
  const t = BATTLE_REWARDS[tier] || BATTLE_REWARDS[1];
  if(winner==='player'){
    const mult = streak>=2 ? 2 : 1; // ×2 after 3rd consecutive win (streak was ≥2 before)
    return {credits: t.winCredits*mult, xp: t.winXp, streakBonus: mult===2};
  }
  return {credits: t.lossCredits, xp: t.lossXp, streakBonus: false};
}

/* ── 17. COOLDOWN HELPERS ───────────────────────────────────────── */

const COOLDOWN_MS = 60 * 60 * 1000; // 1 hour in ms

// Returns true if the card is on cooldown given the cardCooldowns map
function isCardOnCooldown(cardId, cardCooldowns){
  const ts = cardCooldowns && cardCooldowns[cardId];
  return ts ? Date.now() - ts < COOLDOWN_MS : false;
}

// Returns how many ms remain on the cooldown (0 if not on cooldown)
function cooldownRemaining(cardId, cardCooldowns){
  const ts = cardCooldowns && cardCooldowns[cardId];
  if(!ts) return 0;
  return Math.max(0, COOLDOWN_MS - (Date.now()-ts));
}

// Returns true if rarity gets a cooldown after battle
function hasBattleCooldown(rarity){
  return rarity==='Legendary' || rarity==='Epic';
}

/* ── 18. ABILITY POOL (for random assignment in Session 4) ──────── */

const ABILITY_POOL = {
  Common:    ['Grit','Opportunist','Resilience','Shield Up','Tenacity'],
  Uncommon:  ['Smoke Screen','Adrenaline','Pack Tactics','Adaptable','Rebound'],
  Rare:      ['Counterstrike','Fortify','Bleed','Intimidate','Momentum'],
  Epic:      ['Unstoppable','Execute','Drain','Second Wind','Overwhelm'],
  Legendary: ['Apex Predator','Immunity','Last Stand','Overwhelming Force','Dominate'],
};

// Randomly assigns one ability to every card in the ALL_CARDS array.
// Called once from God Mode in Session 4 to populate ALL_CARDS[].ability.
function assignAbilities(cards){
  return cards.map(card => {
    const pool = ABILITY_POOL[card.rarity];
    if(!pool) return card;
    const ability = pool[Math.floor(Math.random()*pool.length)];
    return {...card, ability};
  });
}

function formatCdTime(ms){
  if(ms<=0)return"Ready";
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  if(h>0)return`${h}h ${m}m`;
  return`${m}m`;
}

  d.setDate(d.getDate()+1);
  d.setHours(0,0,0,0);

/* ── BattleTab — orchestrates screens ── */
function BattleTab({collection,battleDeck,setBattleDeck,battleTier,setBattleTier,battleCooldowns,onBattleComplete,notify,gainXp,isGod}){
  const [screen,setScreen]=useState('builder');
  const [battleResult,setBattleResult]=useState(null);

  const startBattle=()=>{
    const deckCards=battleDeck.map(id=>{
      const owned=collection.find(c=>c.id===id);
      return owned||ALL_CARDS.find(c=>c.id===id);
    }).filter(Boolean);

    // Random AI deck from full card pool
    const aiDeck=[...ALL_CARDS].sort(()=>Math.random()-0.5).slice(0,10);

    const result=runBattle(deckCards,aiDeck);
    const rewards=calcBattleRewards(battleTier,result.winner,0);
    onBattleComplete(result,battleDeck,battleTier,rewards);
    setBattleResult({...result,rewards,tier:battleTier});
    setScreen('result');
  };

  if(screen==='result'&&battleResult){
    return(
      <BattleResult
        result={battleResult}
        onRematch={()=>{setBattleResult(null);setScreen('builder');}}
      />
    );
  }

  return(
    <DeckBuilder
      collection={collection}
      sorted={sorted}
      filter={filter} setFilter={setFilter}
      rarityFilter={rarityFilter} setRarityFilter={setRarityFilter}
      sortBy={sortBy} setSortBy={setSortBy}
      search={search} setSearch={setSearch}
      packFilter={packFilter} setPackFilter={setPackFilter}
      rarities={rarities} types={types}
      battleDeck={battleDeck}
      setBattleDeck={setBattleDeck}
      battleTier={battleTier}
      setBattleTier={setBattleTier}
      battleCooldowns={battleCooldowns}
      onStartBattle={startBattle}
      notify={notify}
    />
  );
}

/* ── DeckBuilder ── */
function DeckBuilder({collection,sorted,filter,setFilter,rarityFilter,setRarityFilter,sortBy,setSortBy,search,setSearch,packFilter,setPackFilter,rarities,types,battleDeck,setBattleDeck,battleTier,setBattleTier,battleCooldowns,onStartBattle,notify}){

  // Count selected cards by rarity
  const rarityCounts=(()=>{
    const counts={Legendary:0,Epic:0,Rare:0,Uncommon:0,Common:0};
    battleDeck.forEach(id=>{
      const card=collection.find(c=>c.id===id)||ALL_CARDS.find(c=>c.id===id);
      if(card)counts[card.rarity]=(counts[card.rarity]||0)+1;
    });
    return counts;
  })();

  const isSelected=id=>battleDeck.includes(id);

  const canSelect=card=>{
    if(isSelected(card.id))return true;
    if(battleDeck.length>=DECK_SIZE)return false;
    if(rarityCounts[card.rarity]>=(BATTLE_RARITY_LIMITS[card.rarity]||10))return false;
    return true;
  };

  const toggleCard=card=>{
    if(isSelected(card.id)){
      setBattleDeck(prev=>prev.filter(id=>id!==card.id));
    } else {
      if(!canSelect(card)){
        if(battleDeck.length>=DECK_SIZE)notify('Deck is full! Remove a card first.','#ef5350');
        else notify(`Max ${BATTLE_RARITY_LIMITS[card.rarity]} ${card.rarity} per deck`,'#ff9800');
        return;
      }
      setBattleDeck(prev=>[...prev,card.id]);
    }
  };

  // Use the same sorted array from Game (filters already applied), selected cards float to top
  const displayCards=[...sorted].sort((a,b)=>{
    const aS=isSelected(a.id)?0:1;
    const bS=isSelected(b.id)?0:1;
    return aS-bS;
  });

  const battleLocked=collection.length<DECK_SIZE;
  const deckFull=battleDeck.length===DECK_SIZE;
  const anyOnCooldown=battleDeck.some(id=>isCardOnCooldown(id,battleCooldowns));
  const canStart=deckFull&&!anyOnCooldown;
  const tierRewards=BATTLE_REWARDS[battleTier];

  if(battleLocked){
    return(
      <div style={{padding:"64px 32px",textAlign:"center",maxWidth:"560px",margin:"0 auto"}}>
        <div style={{fontSize:"80px",marginBottom:"24px"}}>🔒</div>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:"24px",color:"#4fc3f7",letterSpacing:"2px",marginBottom:"14px"}}>BATTLE LOCKED</div>
        <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:"20px",color:"#a0a8c0",lineHeight:1.7}}>
          You need at least 10 cards to enter battle.<br/>Open packs to collect more heroes!
        </div>
        <div style={{marginTop:"20px",fontFamily:"monospace",fontSize:"17px",color:"#4fc3f755"}}>
          {collection.length} / 10 cards collected
        </div>
      </div>
    );
  }

  return(
    <div style={{paddingBottom:"200px"}}>

      {/* ── Top controls — mirrors Collection header ── */}
      <div style={{padding:"29px 32px 14px",background:"#060610",position:"sticky",top:0,zIndex:20,borderBottom:"1px solid #0f0f24"}}>

        {/* Title */}
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:"20px",fontWeight:900,color:"#4fc3f7",letterSpacing:"2px",marginBottom:"14px"}}>
          ⚔️ BUILD YOUR DECK
        </div>

        {/* Difficulty tier row */}
        <div style={{marginBottom:"12px"}}>
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"center"}}>
            {TIER_INFO.map(t=>(
              <button key={t.tier} onClick={()=>setBattleTier(t.tier)} style={{
                background:battleTier===t.tier?`${t.color}22`:"transparent",
                border:`1px solid ${battleTier===t.tier?t.color:"#1a1a3a"}`,
                borderRadius:"9px",padding:"6px 13px",
                fontFamily:"'Orbitron',monospace",fontSize:"12px",fontWeight:700,
                color:battleTier===t.tier?t.color:"#404060",
                cursor:"pointer",letterSpacing:"0.5px",transition:"all 0.15s",
              }}>
                {t.emoji} {t.name}
              </button>
            ))}
            <div style={{marginLeft:"auto",fontFamily:"'Rajdhani',sans-serif",fontSize:"15px",color:"#505878",flexShrink:0}}>
              Win <span style={{color:"#4fc3f7"}}>💎{tierRewards.winCredits} +{tierRewards.winXp}XP</span>
              <span style={{margin:"0 8px",color:"#1a1a3a"}}>·</span>
              Loss <span style={{color:"#606880"}}>💎{tierRewards.lossCredits} +{tierRewards.lossXp}XP</span>
            </div>
          </div>
        </div>

        {/* Rarity limit badges */}
        <div style={{display:"flex",gap:"6px",marginBottom:"12px",flexWrap:"wrap"}}>
          {['Legendary','Epic','Rare'].map(r=>{
            const lim=BATTLE_RARITY_LIMITS[r];
            const cnt=rarityCounts[r];
            const cfg=RC[r];
            return(
              <div key={r} style={{background:cnt>0?`${cfg.color}15`:"transparent",border:`1px solid ${cnt>0?cfg.color+"44":"#1a1a3a"}`,borderRadius:"7px",padding:"3px 10px",fontFamily:"monospace",fontSize:"13px",color:cnt>=lim?cfg.color:"#404060"}}>
                <span style={{color:cfg.color}}>{r[0]}</span>:{cnt}/{lim}
              </div>
            );
          })}
          <div style={{background:"transparent",border:"1px solid #1a1a3a",borderRadius:"7px",padding:"3px 10px",fontFamily:"monospace",fontSize:"13px",color:"#404060"}}>U/C: ∞</div>
        </div>

        {/* Pack filter — same as Collection */}
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"8px"}}>
          {[{id:0,label:"All",emoji:"📋",color:"#4fc3f7"},...Object.values(PACKS).map(p=>({id:p.id,label:p.name,emoji:p.emoji,color:p.color}))].map(p=>(
            <button key={p.id} onClick={()=>setPackFilter(p.id)} className="pack-filter-btn" style={{display:"flex",alignItems:"center",gap:"6px",padding:"8px 14px",borderRadius:"14px",background:packFilter===p.id?`${p.color}22`:"transparent",border:`1.5px solid ${packFilter===p.id?p.color:"rgba(255,255,255,0.2)"}`,color:packFilter===p.id?p.color:"#c0c4d8",fontFamily:"'Orbitron',monospace",fontSize:"13px",cursor:"pointer",fontWeight:600,letterSpacing:"0.5px",transition:"all 0.15s",whiteSpace:"nowrap"}}>
              <span>{p.emoji}</span><span>{p.label}</span>
            </button>
          ))}
        </div>

        {/* Search + sort — same as Collection */}
        <div style={{display:"flex",gap:"8px",marginBottom:"8px",alignItems:"center"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search..." className="collection-search" style={{flex:1,minWidth:0,fontSize:"15px",marginBottom:"0"}}/>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="sort-select" style={{background:"#0a0a20",border:"1px solid #2a2a4a",borderRadius:"10px",padding:"8px 10px",color:"#ffffff",fontFamily:"'Rajdhani',sans-serif",fontSize:"15px",cursor:"pointer",outline:"none",flexShrink:0}}>
            <option value="rarity">Rarity</option>
            <option value="name_az">A→Z</option>
            <option value="name_za">Z→A</option>
            <option value="count_hl">Most Owned</option>
            <option value="acquired_new">Newest</option>
            <option value="acquired_old">Oldest</option>
          </select>
        </div>

        {/* Rarity filter pills — same as Collection */}
        <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"4px"}}>
          {rarities.map(r=>{const cfg=r==="All"?{color:"#4fc3f7"}:RC[r];return<button key={r} onClick={()=>setRarityFilter(r)} className="rarity-filter-btn" style={{padding:"5px 12px",borderRadius:"20px",background:rarityFilter===r?`${cfg.color}33`:"transparent",border:`1px solid ${rarityFilter===r?cfg.color:"rgba(255,255,255,0.2)"}`,color:rarityFilter===r?cfg.color:"#c0c4d8",fontFamily:"'Rajdhani',sans-serif",fontSize:"14px",cursor:"pointer",fontWeight:600,transition:"all 0.15s",whiteSpace:"nowrap"}}>{r}</button>;})}
        </div>

        {/* Type filter pills — same as Collection */}
        <div style={{display:"flex",gap:"6px",overflowX:"auto",paddingBottom:"4px",WebkitOverflowScrolling:"touch",scrollbarWidth:"none"}}>
          {types.map(t=><button key={t} onClick={()=>setFilter(t)} className="type-filter-btn" style={{padding:"4px 12px",borderRadius:"20px",background:filter===t?"#4fc3f722":"transparent",border:`1px solid ${filter===t?"#4fc3f7":"rgba(255,255,255,0.2)"}`,color:filter===t?"#4fc3f7":"#c0c4d8",fontFamily:"'Rajdhani',sans-serif",fontSize:"13px",cursor:"pointer",fontWeight:600,transition:"all 0.15s",flexShrink:0,whiteSpace:"nowrap"}}>{t}</button>)}
        </div>
      </div>

      {/* ── Card grid — same layout as Collection ── */}
      <div style={{padding:"29px 32px 0"}}>
        {displayCards.length===0&&(
          <div style={{textAlign:"center",color:"#a8b0c8",padding:"97px 0",fontFamily:"'Orbitron',monospace",fontSize:"21px"}}>
            No matches found.
          </div>
        )}
        <div className="collection-grid" style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"28px"}}>
          {displayCards.map(card=>{
            const selected=isSelected(card.id);
            const onCd=isCardOnCooldown(card.id,battleCooldowns);
            const disabled=!selected&&!canSelect(card);
            const cdMs=cooldownRemaining(card.id,battleCooldowns);

            return(
              <div key={card.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"7px",opacity:disabled?0.35:1,cursor:disabled?"not-allowed":"pointer",transition:"opacity 0.15s"}}>
                <CardWrapper rarity={card.rarity} onClick={()=>!disabled&&toggleCard(card)}>
                  <HeroCard card={card} size="normal" fill/>

                  {/* Cooldown overlay */}
                  {onCd&&(
                    <div style={{position:"absolute",inset:0,background:"rgba(6,6,16,0.8)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"4px"}}>
                      <div style={{fontSize:"22px"}}>⏱️</div>
                      <div style={{fontFamily:"'Orbitron',monospace",fontSize:"10px",color:"#808098",letterSpacing:"1px"}}>COOLDOWN</div>
                      <div style={{fontFamily:"monospace",fontSize:"13px",color:"#4fc3f7"}}>{formatCdTime(cdMs)}</div>
                    </div>
                  )}

                  {/* Selected check */}
                  {selected&&(
                    <div style={{position:"absolute",top:"6px",right:"6px",width:"22px",height:"22px",borderRadius:"50%",background:"#4fc3f7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:900,color:"#060610",boxShadow:"0 0 10px #4fc3f7aa"}}>✓</div>
                  )}

                  {/* Selected border glow */}
                  {selected&&(
                    <div style={{position:"absolute",inset:0,borderRadius:"13px",boxShadow:"inset 0 0 0 2px #4fc3f7",pointerEvents:"none"}}/>
                  )}
                </CardWrapper>

                {/* Ability label — same position as dupe badge in Collection */}
                {card.ability&&(
                  <div style={{background:"#4fc3f722",border:"1px solid #4fc3f755",borderRadius:"8px",padding:"3px 10px",fontFamily:"'Orbitron',monospace",fontSize:"12px",color:"#4fc3f7",fontWeight:700,letterSpacing:"0.5px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>
                    ⚡ {card.ability}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Fixed tray — always visible ── */}
      <div className="battle-tray-fixed" style={{background:"#08081a",borderTop:"1px solid #12122a",padding:"10px 16px 12px"}}>

        {/* 10 deck slots */}
        <div style={{display:"flex",gap:"5px",overflowX:"auto",marginBottom:"9px",paddingBottom:"2px"}}>
          {Array.from({length:DECK_SIZE}).map((_,i)=>{
            const cardId=battleDeck[i];
            const card=cardId?(collection.find(c=>c.id===cardId)||ALL_CARDS.find(c=>c.id===cardId)):null;
            const onCd=card?isCardOnCooldown(card.id,battleCooldowns):false;
            const cfg=card?RC[card.rarity]:null;
            return(
              <div key={i}
                onClick={()=>card&&setBattleDeck(prev=>prev.filter(id=>id!==card.id))}
                title={card?`Remove ${card.name}`:`Slot ${i+1}`}
                style={{flexShrink:0,width:"40px",height:"54px",borderRadius:"7px",overflow:"hidden",border:card?(onCd?"1px solid #ef535044":`1px solid ${cfg.color}55`):"1px dashed #1a1a3a",background:card?`${cfg.color}11`:"#0a0a1e",display:"flex",alignItems:"center",justifyContent:"center",cursor:card?"pointer":"default",position:"relative",transition:"border-color 0.15s"}}
                onMouseEnter={e=>{if(card)e.currentTarget.style.borderColor="#ef5350aa";}}
                onMouseLeave={e=>{if(card)e.currentTarget.style.borderColor=onCd?"#ef535044":`${cfg.color}55`;}}
              >
                {card?(
                  <>
                    <div style={{fontSize:"20px",lineHeight:1}}>{card.emoji}</div>
                    {onCd&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.65)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px"}}>⏱️</div>}
                  </>
                ):(
                  <div style={{fontFamily:"monospace",fontSize:"13px",color:"#1a1a3a",fontWeight:700}}>{i+1}</div>
                )}
              </div>
            );
          })}
        </div>

        {/* Start battle button */}
        <button
          onClick={canStart?onStartBattle:undefined}
          style={{width:"100%",background:canStart?"linear-gradient(135deg,#4fc3f7,#00e5ff)":"#0a0a1e",border:canStart?"none":"1px solid #1a1a3a",borderRadius:"13px",padding:"14px",fontFamily:"'Orbitron',monospace",fontSize:"16px",fontWeight:900,color:canStart?"#060610":"#303050",cursor:canStart?"pointer":"not-allowed",letterSpacing:"2px",boxShadow:canStart?"0 0 18px #4fc3f755":"none",transition:"all 0.2s"}}
        >
          {anyOnCooldown?"⏱️ CARDS ON COOLDOWN":deckFull?"⚔️ START BATTLE":`SELECT ${DECK_SIZE-battleDeck.length} MORE CARD${DECK_SIZE-battleDeck.length!==1?"S":""}`}
        </button>

        {/* Deck count */}
        <div style={{textAlign:"center",marginTop:"6px",fontFamily:"monospace",fontSize:"13px",color:deckFull?"#4fc3f7":"#404060"}}>
          {battleDeck.length}/{DECK_SIZE} cards selected
          {anyOnCooldown&&<span style={{color:"#ef5350",marginLeft:"10px"}}>· cooldown active</span>}
        </div>
      </div>
    </div>
  );
}

/* ── BattleResult ── */
function BattleResult({result,onRematch}){
  const {winner,log,rewards,tier}=result;
  const won=winner==='player';
  const tierInfo=TIER_INFO[(tier||1)-1];
  const rounds=log?log.filter(e=>e.type==='ROUND_START').length:0;

  return(
    <div style={{padding:"56px 32px 80px",textAlign:"center",maxWidth:"480px",margin:"0 auto",animation:"fadeIn 0.4s ease-out"}}>

      <div style={{fontSize:"88px",marginBottom:"18px",animation:"float 2s ease-in-out infinite"}}>
        {won?"🏆":"💀"}
      </div>

      <div style={{
        fontFamily:"'Orbitron',monospace",fontSize:"34px",fontWeight:900,
        color:won?"#ffd700":"#ef5350",
        letterSpacing:"3px",marginBottom:"8px",
        textShadow:won?"0 0 24px #ffd70077":"0 0 24px #ef535077",
      }}>
        {won?"VICTORY":"DEFEAT"}
      </div>

      <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:"17px",color:"#505878",marginBottom:"32px"}}>
        {tierInfo.emoji} {tierInfo.name} · {rounds} round{rounds!==1?"s":""}
      </div>

      {/* Rewards card */}
      <div style={{background:"#0a0a1e",border:"1px solid #12122a",borderRadius:"20px",padding:"28px",marginBottom:"28px"}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:"12px",color:"#404060",letterSpacing:"2px",marginBottom:"18px"}}>REWARDS EARNED</div>
        <div style={{display:"flex",justifyContent:"center",gap:"40px"}}>
          <div>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:"32px",fontWeight:900,color:"#4fc3f7"}}>+{(rewards.credits||0).toLocaleString()}</div>
            <div style={{fontFamily:"monospace",fontSize:"13px",color:"#505878",marginTop:"4px"}}>💎 CREDITS</div>
          </div>
          <div>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:"32px",fontWeight:900,color:"#ffd700"}}>+{(rewards.xp||0).toLocaleString()}</div>
            <div style={{fontFamily:"monospace",fontSize:"13px",color:"#505878",marginTop:"4px"}}>XP</div>
          </div>
        </div>
        {rewards.streakBonus&&(
          <div style={{marginTop:"14px",fontFamily:"'Orbitron',monospace",fontSize:"12px",color:"#ff9800",letterSpacing:"1px"}}>🔥 WIN STREAK BONUS ×2</div>
        )}
      </div>

      <button onClick={onRematch} style={{
        width:"100%",background:"linear-gradient(135deg,#4fc3f7,#00e5ff)",
        border:"none",borderRadius:"14px",padding:"16px",
        fontFamily:"'Orbitron',monospace",fontSize:"17px",fontWeight:900,
        color:"#060610",cursor:"pointer",letterSpacing:"2px",
        boxShadow:"0 0 16px #4fc3f755",
      }}>
        ⚔️ BATTLE AGAIN
      </button>

      <div style={{marginTop:"14px",fontFamily:"'Rajdhani',sans-serif",fontSize:"14px",color:"#303050"}}>
        Used cards are on cooldown until midnight
      </div>
    </div>
  );
}

</script>
</script>
</body>
</html>
